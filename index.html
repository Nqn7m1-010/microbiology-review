<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微生物学期末复习系统</title>
<style>
:root{--primary:#1a3a5c;--primary-light:#2a5a8c;--accent:#e67e22;--bg:#f5f7fa;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;--border:#e1e8ed;--success:#27ae60;--danger:#e74c3c;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:600;white-space:nowrap}
.header-right{margin-left:auto;display:flex;gap:4px;align-items:center}
.header-right button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s}
.header-right button:hover{background:rgba(255,255,255,.25)}
.tabs{display:flex;background:var(--primary);padding:0 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 12px;color:rgba(255,255,255,.65);cursor:pointer;white-space:nowrap;font-size:12px;border-bottom:3px solid transparent;transition:all .2s;flex-shrink:0}
.tab:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.08)}
.tab.active{color:#fff;border-bottom-color:var(--accent);background:rgba(255,255,255,.1)}
.main{flex:1;overflow:hidden;display:flex}
.page{display:none;width:100%;height:100%;overflow-y:auto;padding:12px 16px}
.page.active{display:block}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--primary-light)}
.term-card{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:flex-start;gap:8px}
.term-card:hover{background:#f8f9fa}
.term-card:last-child{border-bottom:none}
.term-check{font-size:16px;cursor:pointer;flex-shrink:0;margin-top:2px;width:20px;text-align:center}
.term-name{font-weight:600;color:var(--primary);font-size:14px;flex:1}
.term-def{font-size:13px;color:var(--text-light);margin-top:4px;display:none;line-height:1.6;padding-left:28px}
.term-card.expanded .term-def{display:block}
.letter-index{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.letter-index span{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--border);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.letter-index span:hover,.letter-index span.active{background:var(--primary-light);color:#fff}
.qa-q{font-weight:600;font-size:14px;color:var(--primary);cursor:pointer;padding:8px 0}
.qa-a{font-size:13px;color:var(--text);line-height:1.7;padding:8px 12px;background:#f8f9fa;border-radius:8px;margin-top:4px;display:none}
.qa-item.open .qa-a{display:block}
.exam-section-title{font-weight:600;color:var(--primary);margin:10px 0 6px;font-size:14px;border-left:3px solid var(--accent);padding-left:8px}
.exam-question{padding:6px 0;border-bottom:1px solid #f0f0f0}
.exam-q-text{font-size:13px;margin-bottom:4px}
.exam-answer{font-size:13px;color:var(--success);display:none;padding:6px 10px;background:#eafaf1;border-radius:6px;margin-top:4px}
.exam-show-btn{font-size:12px;color:var(--primary-light);cursor:pointer;background:none;border:none}
.exam-options{display:flex;flex-direction:column;gap:4px;margin:4px 0}
.exam-opt{padding:6px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s;background:var(--card)}
.exam-opt:hover{border-color:var(--primary-light)}
.exam-opt.correct{background:#eafaf1;border-color:var(--success);color:var(--success)}
.exam-opt.wrong{background:#fde8e8;border-color:var(--danger);color:var(--danger)}
.exam-opt.disabled{opacity:.6;cursor:default}
.quiz-header{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.quiz-header select{padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:var(--card);color:var(--text)}
.quiz-header select:focus{border-color:var(--primary-light)}
.quiz-progress{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:8px 0}
.quiz-progress-fill{height:100%;background:var(--primary-light);border-radius:3px;transition:width .3s}
.quiz-stats{display:flex;gap:16px;margin:8px 0;flex-wrap:wrap}
.quiz-stat{font-size:13px;color:var(--text-light)}
.quiz-stat b{color:var(--text)}
.quiz-card{padding:16px;margin-bottom:12px;border-left:4px solid var(--primary-light)}
.quiz-card.correct{border-left-color:var(--success);background:#f0faf4}
.quiz-card.wrong{border-left-color:var(--danger);background:#fdf0ef}
.quiz-q-num{font-size:12px;color:var(--text-light);margin-bottom:4px}
.quiz-q-chapter{font-size:11px;color:var(--accent);margin-bottom:2px}
.quiz-q-text{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.5}
.quiz-opt{padding:8px 12px;border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:4px;transition:all .15s;background:var(--card)}
.quiz-opt:hover{border-color:var(--primary-light)}
.quiz-opt.selected-correct{background:#eafaf1;border-color:var(--success);color:var(--success);font-weight:600}
.quiz-opt.selected-wrong{background:#fde8e8;border-color:var(--danger);color:var(--danger);font-weight:600}
.quiz-opt.show-correct{background:#eafaf1;border-color:var(--success)}
.quiz-opt.disabled{pointer-events:none;opacity:.7}
.quiz-explain{font-size:13px;color:var(--text-light);margin-top:8px;padding:8px 12px;background:#f8f9fa;border-radius:6px;display:none;line-height:1.5}
.quiz-explain.show{display:block}
.quiz-result-bar{display:flex;gap:0;border-radius:8px;overflow:hidden;height:24px;margin:8px 0}
.quiz-result-bar span{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600}
.flashcard-container{display:flex;flex-direction:column;align-items:center;padding:16px 0}
.flashcard{width:100%;max-width:480px;height:200px;perspective:1000px;cursor:pointer;margin-bottom:12px}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.flashcard-front{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.flashcard-front .fc-label{font-size:13px;opacity:.8;margin-bottom:8px}
.flashcard-front .fc-main{font-size:24px;font-weight:700}
.flashcard-back{background:var(--card);transform:rotateY(180deg);border:2px solid var(--border)}
.flashcard-back .fc-label{font-size:12px;color:var(--text-light);margin-bottom:6px}
.flashcard-back .fc-main{font-size:18px;color:var(--text);line-height:1.5}
.flashcard-back .fc-hint{font-size:11px;color:var(--accent);margin-top:6px}
.fc-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.fc-controls button{padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.fc-btn-prev{background:var(--border);color:var(--text)}
.fc-btn-next{background:var(--primary-light);color:#fff}
.fc-btn-shuffle{background:var(--accent);color:#fff}
.fc-btn-auto{background:#8e44ad;color:#fff}
.fc-btn-auto.active{background:#6c3483;box-shadow:0 0 0 2px rgba(142,68,173,.4)}
.fc-progress{width:100%;max-width:480px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:8px 0}
.fc-progress-fill{height:100%;background:var(--primary-light);border-radius:2px;transition:width .3s}
.fc-counter{font-size:12px;color:var(--text-light)}
.latin-item{padding:8px 12px;background:var(--card);border-radius:8px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:4px}
.latin-item .cn{color:var(--text)}
.latin-item .la{color:var(--primary-light);font-style:italic;font-weight:600}
.latin-item .level{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
.latin-item .level.red{background:#fde8e8;color:#c0392b}
.latin-item .level.blue{background:#e8f0fd;color:#2980b9}
.notes-content{font-size:14px;line-height:1.8;padding:12px}
.notes-content h2{color:var(--primary);margin:16px 0 8px;font-size:17px;border-bottom:1px solid var(--border);padding-bottom:4px}
.notes-content h3{color:var(--primary-light);margin:12px 0 6px;font-size:15px}
.notes-content h4{color:var(--text);margin:10px 0 4px;font-size:14px;font-weight:600}
.notes-content p{margin:6px 0;font-size:var(--note-fs,14px)}
.notes-content table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.notes-content td,.notes-content th{border:1px solid var(--border);padding:6px 8px;text-align:left}
.notes-content th{background:var(--primary);color:#fff;font-weight:600}
.notes-content tr:nth-child(even){background:#f8f9fa}
.notes-content ul,.notes-content ol{margin:4px 0 4px 20px}
.notes-content li{margin:2px 0}
.chapter-nav{display:flex;gap:4px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.chapter-nav button{padding:4px 10px;border:1px solid var(--border);border-radius:12px;font-size:11px;cursor:pointer;background:var(--card);color:var(--text-light);transition:all .15s}
.chapter-nav button:hover{border-color:var(--primary-light);color:var(--primary-light)}
.search-result{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer}
.search-result:hover{background:#f8f9fa}
.search-result .sr-title{font-weight:600;font-size:14px;color:var(--primary)}
.search-result .sr-source{font-size:10px;color:var(--accent);margin-bottom:2px}
.search-result .sr-snippet{font-size:12px;color:var(--text-light);line-height:1.4}
mark{background:#fff3cd;padding:0 2px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0}
.progress-bar-fill{height:100%;background:var(--success);border-radius:2px;transition:width .3s}
.toggle-group{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.toggle-btn{padding:4px 12px;border:1px solid var(--border);border-radius:16px;font-size:12px;cursor:pointer;background:var(--card);transition:all .15s;color:var(--text-light)}
.toggle-btn.active{background:var(--primary-light);color:#fff;border-color:var(--primary-light)}
.dark-mode{--bg:#1a1a2e;--card:#16213e;--text:#e0e0e0;--text-light:#a0a0b0;--border:#2a2a4a;--shadow:0 2px 12px rgba(0,0,0,.3)}
.dark-mode .notes-content table td{border-color:#2a2a4a}
.dark-mode .notes-content table tr:nth-child(even){background:#1a1a2e}
@media(max-width:768px){
  .header h1{font-size:15px}
  .tab{padding:6px 10px;font-size:11px}
  .page{padding:8px 10px}
  .flashcard{height:170px}
  .flashcard-front .fc-main{font-size:20px}
}
.empty-state{text-align:center;padding:30px 16px;color:var(--text-light)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:.4}
.timer{font-size:13px;color:var(--accent);font-weight:600;display:inline-block;padding:4px 12px;background:rgba(230,126,34,.1);border-radius:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.notification{position:fixed;top:16px;right:16px;padding:10px 16px;border-radius:8px;color:#fff;font-size:13px;z-index:9999;animation:slideIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.notification.info{background:var(--primary-light)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🦠 微生物学复习</h1>
    <div class="header-right">
      <button onclick="changeFontSize(-1)" title="缩小字体">A-</button>
      <button onclick="changeFontSize(1)" title="放大字体">A+</button>
      <button onclick="toggleDark()" title="夜间模式">🌙</button>
      <span style="font-size:12px;opacity:.8" id="progressSummary"></span>
    </div>
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-page="notes" onclick="switchPage('notes')">📖 笔记</div>
    <div class="tab" data-page="terminology" onclick="switchPage('terminology')">📝 名词</div>
    <div class="tab" data-page="qa" onclick="switchPage('qa')">❓ 简答</div>
    <div class="tab" data-page="flashcard" onclick="switchPage('flashcard')">🃏 闪卡</div>
    <div class="tab" data-page="latin" onclick="switchPage('latin')">🔬 拉丁名</div>
    <div class="tab" data-page="exam" onclick="switchPage('exam')">📋 试卷</div>
    <div class="tab" data-page="quiz" onclick="switchPage('quiz')">✏️ 题库</div>
    <div class="tab" data-page="search" onclick="switchPage('search')">🔍 搜索</div>
  </div>
  <div class="main">
    <div class="page active" id="page-notes">
      <div class="chapter-nav" id="chapterNav"></div>
      <div class="search-box"><input type="text" id="notesSearch" placeholder="搜索笔记..." oninput="filterNotes()"></div>
      <div class="notes-content" id="notesContent">加载中...</div>
    </div>
    <div class="page" id="page-terminology">
      <div class="search-box"><input type="text" id="termSearch" placeholder="搜索名词..." oninput="filterTerms()"></div>
      <div class="letter-index" id="letterIndex"></div>
      <div id="termList"></div>
      <div class="progress-bar"><div class="progress-bar-fill" id="termProgress" style="width:0%"></div></div>
      <div style="text-align:center;font-size:11px;color:var(--text-light);margin-top:4px">点击名词展开 · 点击⬜标记已掌握 · 已掌握 <span id="termCount">0</span> / <span id="termTotal">0</span></div>
    </div>
    <div class="page" id="page-qa">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <input type="text" id="qaSearch" placeholder="搜索题目..." oninput="filterQA()" style="flex:1;padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:14px;outline:none">
        <button onclick="randomQA()" style="padding:8px 16px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px">🎲 随机一题</button>
      </div>
      <div id="qaRandom" style="display:none;margin-bottom:10px"></div>
      <div class="toggle-group" id="qaTopics"></div>
      <div id="qaList"></div>
    </div>
    <div class="page" id="page-flashcard">
      <div class="toggle-group" id="fcMode">
        <button class="toggle-btn active" data-mode="term" onclick="setFCMode('term')">📝 名词</button>
        <button class="toggle-btn" data-mode="latin" onclick="setFCMode('latin')">🔬 拉丁名</button>
      </div>
      <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
          <div class="flashcard-inner">
            <div class="flashcard-front"><div class="fc-label" id="fcFrontLabel">名词</div><div class="fc-main" id="fcFront"></div></div>
            <div class="flashcard-back"><div class="fc-label" id="fcBackLabel">释义</div><div class="fc-main" id="fcBack"></div><div class="fc-hint" id="fcHint">点击翻转</div></div>
          </div>
        </div>
        <div class="fc-progress"><div class="fc-progress-fill" id="fcProgressFill"></div></div>
        <div class="fc-controls">
          <button class="fc-btn-prev" onclick="prevCard()">◀</button>
          <button class="fc-btn-shuffle" onclick="shuffleCards()">🔀</button>
          <button class="fc-btn-auto" id="fcAutoBtn" onclick="toggleAutoPlay()">▶ 自动</button>
          <button class="fc-btn-next" onclick="nextCard()">▶</button>
        </div>
        <div class="fc-counter" id="fcCounter">1 / 1</div>
      </div>
    </div>
    <div class="page" id="page-latin">
      <div class="search-box"><input type="text" id="latinSearch" placeholder="搜索..." oninput="filterLatin()"></div>
      <div class="toggle-group" id="latinGroups"></div>
      <div id="latinList"></div>
    </div>
    <div class="page" id="page-exam">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
        <div class="toggle-group" id="examToggle" style="margin-bottom:0">
          <button class="toggle-btn active" onclick="showExam('A')">试卷 A</button>
          <button class="toggle-btn" onclick="showExam('B')">试卷 B</button>
          <button class="toggle-btn" onclick="showExam('C')">试卷 C</button>
        </div>
        <span class="timer" id="examTimer">⏱ 00:00</span>
      </div>
      <div id="examContent"></div>
    </div>
    <div class="page" id="page-quiz">
      <div class="quiz-header">
        <select id="quizChapter" onchange="renderQuiz()">
          <option value="">全部章节</option>
          <option value="绪论">绪论</option>
          <option value="原核微生物">原核微生物</option>
          <option value="真核微生物">真核微生物</option>
          <option value="病毒">病毒</option>
          <option value="营养">营养</option>
          <option value="代谢">代谢</option>
          <option value="生长">生长</option>
          <option value="遗传">遗传</option>
          <option value="生态">生态</option>
        </select>
        <select id="quizCount" onchange="renderQuiz()">
          <option value="10">10题</option>
          <option value="20">20题</option>
          <option value="30" selected>30题</option>
          <option value="50">50题</option>
          <option value="0">全部</option>
        </select>
        <button onclick="renderQuiz()" style="padding:6px 14px;border:none;border-radius:8px;background:var(--primary-light);color:#fff;cursor:pointer;font-size:13px">🔄 刷新</button>
        <button id="quizModeBtn" onclick="toggleQuizMode()" style="padding:6px 14px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px">🎯 答题模式</button>
        <span style="font-size:12px;color:var(--text-light);margin-left:auto" id="quizPoolInfo"></span>
      </div>
      <div class="quiz-progress" id="quizProgressWrap" style="display:none"><div class="quiz-progress-fill" id="quizProgressFill" style="width:0%"></div></div>
      <div class="quiz-stats" id="quizStats"></div>
      <div id="quizList"></div>
    </div>
    <div class="page" id="page-search">
      <div class="search-box"><input type="text" id="globalSearch" placeholder="搜索所有资料..." oninput="globalSearch()"></div>
      <div id="searchResults"></div>
    </div>
  </div>
</div>
<script>
// ===== DATA =====
const TERMINOLOGY = [
  {name:"氨基酸异养型微生物",def:"能利用非氨基酸类简单氮源自行合成自身所需的一切氨基酸的微生物",letter:"A"},
  {name:"艾姆氏试验",def:"利用细菌营养缺陷型的回复突变来检测环境或食品中是否存在化学致癌物的方法",letter:"A"},
  {name:"ADCC",def:"抗体依赖的细胞介导的细胞毒作用，指表达IgGFc受体的NK细胞等通过与已结合靶细胞表面的IgG抗体的Fc段结合而杀伤靶细胞",letter:"A"},
  {name:"氨化作用",def:"含氮有机物经微生物的分解而产生氨的作用",letter:"A"},
  {name:"伴胞晶体",def:"少数芽孢杆菌在其形成芽孢的同时，在细胞内形成的一种菱形或双椎形碱溶性蛋白晶体，对昆虫尤其鳞翅目幼虫有毒杀作用",letter:"B"},
  {name:"鞭毛",def:"生长在某些细菌表面的长丝状、波曲的蛋白质",letter:"B"},
  {name:"病毒",def:"一类只含一种类型核酸、专性活细胞内寄生、在离体条件下能以无生命的化学大分子状态长期存在并保持其活性的超显微非细胞结构的分子生物",letter:"B"},
  {name:"巴斯德效应",def:"酵母菌酒精发酵时通入氧气，发酵减慢，停止产生乙醇，葡萄糖消耗速率下降。氧对发酵的这种抑制现象",letter:"B"},

const SHORT_QUESTIONS = [
  {topic:"细胞结构",q:"G+菌和G-菌细胞壁结构和组成上有何差别？与革兰氏染色反应的关系？",
   a:"结构：G+菌细胞壁厚（30-40nm），仅1层；G-菌细胞壁薄（8-10nm），有多层。组成：G+菌含肽聚糖且含量高（40-90%）、含磷壁酸；G-菌含肽聚糖但含量低（5-10%），不含磷壁酸，含脂多糖、膜蛋白等。染色关系：G+菌肽聚糖含量高，酒精脱色时失水网孔变小，阻止结晶紫-碘复合物洗脱；G-菌外膜易被酒精洗脱，肽聚糖层薄，不能阻止结晶紫-碘复合物被洗脱。"},
  {topic:"细胞结构",q:"革兰氏染色的方法步骤及原理？",
   a:"步骤：涂片→干燥→固定→结晶紫初染→碘液媒染→酒精脱色→番红复染→干燥→镜检。原理：G-菌细胞壁类脂质多，肽聚糖少，酒精脱色时类脂质被溶解增加通透性，结晶紫-碘复合物渗出，细胞脱色后呈复染剂颜色。G+菌肽聚糖含量多且交联度大，类脂质少，酒精脱色后肽聚糖层孔径变小，通透性降低，保留初染颜色。"},
  {topic:"细胞结构",q:"叙述细菌细胞的各部分构造与功能。",
   a:"基本结构：细胞壁（维持外形、保护、鞭毛运动支点）、细胞膜（物质交换、维持渗透压、产能基地）、细胞质（营养合成转化代谢场所）、核区（记录传递遗传信息）。特殊结构：鞭毛（运动）、芽孢（抗逆性休眠体）、荚膜（保护、贮存物）。"},
  {topic:"细胞结构",q:"简述原核微生物和真核微生物的主要区别？",
   a:"原核微生物：细胞核无核膜包裹，只有核区的裸露DNA，单细胞生物，包括古细菌和真细菌。真核微生物：细胞核有核膜，能进行有丝分裂，细胞质中有线粒体等细胞器的微生物，包括真菌、微藻类、原生动物等。主要区别：核膜有无、细胞器有无、核糖体大小(70S vs 80S)、DNA含量、组蛋白、鞭毛结构(简单vs9+2型)、遗传重组方式等。"},
  {topic:"细胞结构",q:"肽聚糖有哪几种化学成分？图示其结构。",
   a:"肽聚糖由氨基酸和氨基糖组成。氨基酸包含四肽（L-Ala-D-Glu-L-Lys/L-DAP-D-Ala）和五肽（五个甘氨酸形成的肽桥）；氨基糖由N-乙酰葡萄糖胺（NAG）和N-乙酰胞壁酸（NAM）组成。双糖单位通过β-1,4糖苷键连接。"},
  {topic:"微生物学史",q:"试述几位著名微生物学家的主要贡献？",
   a:"巴斯德：证实发酵实质；否定自然发生说（鹅颈瓶实验）；发明巴斯德消毒法；疫苗生产法。科赫：建立微生物分离纯化、固体培养基、染色技术；提出柯赫准则。列文虎克：首次观察到微生物。贝耶林克：发现非共生固氮菌。维诺格拉德斯基：发现微生物自养生活。"},
  {topic:"真菌",q:"真菌的无性孢子和有性孢子分别有哪些类型？",
   a:"无性孢子：节孢子、厚垣孢子、分生孢子、孢囊孢子、游动孢子、芽孢子。有性孢子：卵孢子（壶菌门）、接合孢子（接合菌门）、子囊孢子（子囊菌门）、担孢子（担子菌门）。"},
  {topic:"真菌",q:"比较根霉与毛霉的异同。",
   a:"同属于毛霉目，菌丝无隔膜，多核。无性繁殖产生不能游动的孢囊孢子，有性繁殖产生双倍体的接合孢子。主要区别：根霉有假根和匍匐菌丝，毛霉无假根。"},
  {topic:"微生物分类",q:"细菌、放线菌、酵母菌和霉菌菌落特征的比较。",
   a:"细菌：湿润、透明或稍透明、小而突起、不结合、颜色多样。放线菌：干燥、不透明、大而疏松或紧密、牢固结合、常带土腥味。酵母菌：较湿润、稍透明、大而突起、不结合、多带酒香味。霉菌：干燥、不透明、疏松或致密、较牢固结合、有霉味。"},
  {topic:"病毒",q:"什么是朊病毒？与真病毒的主要区别是什么？",
   a:"朊病毒是一类不含核酸的传染性蛋白质分子，可引起同类蛋白质分子发生构象变化，使宿主致病。与真病毒区别：无免疫原性，无核酸成分，由宿主细胞内基因编码，抗逆境性强，不被蛋白酶水解。"},
  {topic:"病毒",q:"试述T4噬菌体的结构和繁殖过程。",
   a:"结构：头部（二十面体对称，内含DNA）、颈部、尾部（尾鞘、尾髓、尾丝、基板）。繁殖过程：吸附→侵入（DNA注入，外壳留外）→增殖（DNA复制+蛋白质合成）→装配（头部+尾部自组装结合）→释放（裂解细胞）。"},
  {topic:"病毒",q:"温和噬菌体与烈性噬菌体的区别？什么是溶源性？",
   a:"烈性噬菌体：侵入敏感细菌后迅速增殖并裂解细胞。温和噬菌体：侵入宿主后不裂解细胞，其DNA整合到宿主染色体上同步复制，称为溶源性。含有温和噬菌体的细菌称溶源性细菌，整合的噬菌体DNA称前噬菌体。溶源性细菌特点：遗传性、自发裂解、诱发裂解、免疫性、复愈、溶源转变。"},
  {topic:"微生物营养",q:"微生物的营养类型有哪四种？各举一例。",
   a:"1）光能无机自养型（光能自养型）：如蓝细菌、藻类，以CO₂为碳源，光为能源。2）光能有机异养型（光能异养型）：如红螺菌，以简单有机物为供氢体。3）化能无机自养型（化能自养型）：如硝化细菌、硫化细菌，无机物氧化获能，CO₂为碳源。4）化能有机异养型（化能异养型）：如黑曲霉、大肠杆菌，有机物为碳源和能源。"},
  {topic:"微生物营养",q:"什么是生长因子？包括哪几类化合物？",
   a:"生长因子是一类对微生物正常代谢必不可少且不能用简单碳源或氮源自行合成的微量有机物。广义的包括维生素、碱基（嘌呤及其衍生物）、胺类以及需要量较大的氨基酸；狭义的是指维生素。"},
  {topic:"微生物营养",q:"营养物质进入细胞的方式有哪几种？",
   a:"1）单纯扩散：顺浓度梯度，无载体，不耗能。2）促进扩散：顺浓度梯度，有载体，不耗能。3）主动运输：逆浓度梯度，有载体，耗能，不改变结构。4）基团转位：逆浓度梯度，耗能，改变被运输物结构（如磷酸化）。"},
  {topic:"微生物营养",q:"配制培养基应遵循哪些原则？",
   a:"1）目的明确；2）营养协调（尤其C/N比100/0.5-2）；3）物理化学条件适宜（pH、渗透压、水活度、氧化还原电位）；4）经济节约（以粗代精、以废代好）。"},
  {topic:"微生物代谢",q:"试述固氮微生物的种类及其固氮的生化机制。",
   a:"种类：自生固氮菌、共生固氮菌（根瘤菌）、联合固氮菌。必要条件：固氮酶（钼铁蛋白+铁蛋白）、能量(ATP)、还原力、严格厌氧微环境。生化途径：N₂+8[H]+18~24ATP→2NH₃+H₂+18~24ADP+18~24Pi"},
  {topic:"微生物代谢",q:"比较有氧呼吸、无氧呼吸、发酵的异同。",
   a:"发酵：无氧、不经电子传递链、电子交给中间代谢产物、产能效率低（2ATP）。有氧呼吸：有氧、经完整呼吸链、氧为最终电子受体、产能效率高（38ATP）。无氧呼吸：无氧、经部分呼吸链、无机物（NO₃⁻、SO₄²⁻、CO₂等）为最终电子受体、产能效率居中。"},
  {topic:"微生物代谢",q:"微生物产能代谢主要有哪几条途径？",
   a:"四条主要途径：EMP途径（糖酵解，绝大多数生物共有）、HMP途径（己糖磷酸途径，产生NADPH₂和多种碳架）、ED途径（2-酮-3-脱氧-6-磷酸葡萄糖酸途径，微生物特有，用于细菌酒精发酵）、TCA循环（三羧酸循环，代谢枢纽）。"},
  {topic:"微生物代谢",q:"微生物进行合成代谢的三要素是什么？如何产生？",
   a:"三要素：能量（ATP）、小分子前体物质、还原力（NADH₂/NADPH₂）。ATP来源：底物水平磷酸化、氧化磷酸化、光合磷酸化。还原力来源：EMP和TCA产生NADH₂，HMP产生NADPH₂。小分子前体来自糖代谢中间产物（共12种）。"},
  {topic:"微生物代谢",q:"细菌肽聚糖合成的三个阶段？",
   a:"1）细胞质阶段：生成Park核苷酸（UDP-N-乙酰胞壁酸五肽）；2）细胞膜阶段：与脂质载体（细菌萜醇）结合，生成肽聚糖单体（双糖肽亚单位）；3）细胞膜外阶段：转糖基作用连接成链，转肽酶交联形成网状结构（青霉素抑制此步）。"},
  {topic:"微生物生长",q:"细菌生长曲线分哪几个时期？各时期特征及应用？",
   a:"延滞期：菌数不增加，细胞合成物质准备分裂，代谢活跃。应用上尽量缩短（对数期接种、增大接种量）。对数期：菌数以指数增加，代时稳定，代谢最强。是研究微生物生理/遗传的好材料。稳定期：菌体生长和死亡速度相等，菌量最大，积累次级代谢产物。衰亡期：菌数指数下降，细胞自溶。应及时放罐。"},
  {topic:"微生物生长",q:"影响微生物生长的理化因素有哪些？",
   a:"温度（嗜冷<20℃/嗜温20-45℃/嗜热>45℃）、pH（细菌6.5-7.5/放线菌7.5-8/霉菌5-6）、氧气（好氧/厌氧/兼性/微好氧）、辐射（紫外线消毒）、渗透压（高渗防腐）、干燥、水活度、表面张力等。"},
  {topic:"微生物生长",q:"微生物与氧的关系可分为哪几类？举例。",
   a:"1）专性好氧菌：必须有氧，如固氮菌属。2）兼性厌氧菌：有氧无氧均可，如酿酒酵母。3）微好氧菌：低氧浓度下生长，如霍乱弧菌。4）耐氧菌：有氧无氧都进行发酵，如乳酸乳杆菌。5）专性厌氧菌：严格无氧，如梭菌属。"},
  {topic:"微生物遗传",q:"什么是质粒？质粒有什么特性？",
   a:"游离于原核生物核基因组以外，具有独立复制能力的小型共价闭合环状dsDNA分子。特性：非必要的遗传物质；能自我复制稳定遗传；具不相容性和相容性；可转移性；可消除性；可整合性；耐碱性。种类：F因子、R因子、Col因子、Ti质粒、降解质粒等。"},
  {topic:"微生物遗传",q:"简述原核微生物基因重组的四种方式。",
   a:"1）转化：受体菌直接吸收供体菌游离DNA片段，不需细胞接触。2）转导：以缺陷噬菌体为媒介转移DNA，不需细胞接触。3）接合：通过性菌毛直接接触传递大段DNA，需F因子。4）原生质体融合：通过化学或电场诱导使去壁原生质体融合并产生重组子。"},
  {topic:"微生物遗传",q:"简述DNA损伤修复系统。",
   a:"1）光复活：可见光激活光复活酶，使嘧啶二聚体恢复为单体。2）切除修复（暗修复）：切-补-切-封，不产生突变。3）重组修复：复制后母链与子链重组填补缺口，不产生突变。4）SOS修复：易误修复，产生突变。前三种属无错误修复，SOS属易误修复。"},
  {topic:"微生物遗传",q:"证明突变自发性的三个经典实验？",
   a:"1）变量试验（Luria-Delbrück, 1943）：抗性菌落数在各培养皿中差异大，说明突变发生在接触噬菌体之前。2）涂布试验（Newcombe, 1949）：抗性突变发生在未接触噬菌体之前。3）影印培养试验（Lederberg, 1952）：从非选择性平板上检出抗性菌落，证明突变是自发的。"},
  {topic:"微生物遗传",q:"叙述诱变育种的操作步骤。",
   a:"1）选择合适出发菌株；2）制备单细胞/单孢子悬液；3）诱变处理（物理：UV、X射线；化学：DES、EMS、NTG）；4）中间培养（表型延迟）；5）筛选（初筛以量为主+复筛以质为主）；6）保藏和扩大试验。"},
  {topic:"微生物生态",q:"微生物与生物环境之间有哪几种关系？",
   a:"1）互生：较松散联合，双方有利（如根际微生物与植物）。2）共生：紧密结合形成特殊结构（如地衣=藻类+真菌）。3）寄生：一种生物从另一种获取营养（如病原微生物）。4）拮抗：一种生物产生不利于他种的物质（如抗生素）。5）捕食：一种生物直接吞食另一种（如原生动物吞食细菌）。"},
  {topic:"微生物生态",q:"微生物在氮素循环中的作用有哪些？",
   a:"1）固氮作用：N₂→NH₃（固氮菌、根瘤菌）。2）氨化作用：有机氮→NH₃（腐败微生物）。3）硝化作用：NH₃→NO₂⁻→NO₃⁻（亚硝化细菌、硝化细菌）。4）反硝化作用：NO₃⁻→N₂（反硝化细菌）。5）氨同化作用：NH₃→氨基酸（微生物自身利用）。"},
];

  {chapter:"原核微生物",q:"鞭毛的化学本质是？",opts:["多糖","脂类","蛋白质","核酸"],answer:2,explain:"鞭毛主要化学成分是蛋白质（鞭毛蛋白），是细菌的运动器官。"},
  {chapter:"原核微生物",q:"蓝细菌的营养类型是？",opts:["化能异养","光能自养（产氧）","光能自养（不产氧）","化能自养"],answer:1,explain:"蓝细菌含叶绿素a，进行放氧型光合作用，属'先锋生物'。"},
  {chapter:"原核微生物",q:"细菌菌落的特点是？",opts:["干燥不透明","湿润透明","绒毛状疏松","大而厚乳白"],answer:1,explain:"细菌菌落湿润、透明或稍透明、小而突起。"},

  {chapter:"真核微生物",q:"酵母菌细胞壁主要含？",opts:["肽聚糖","几丁质","甘露聚糖","纤维素"],answer:2,explain:"酵母菌细胞壁含甘露聚糖、葡聚糖、蛋白质和类脂。"},
  {chapter:"真核微生物",q:"原核与真核核糖体区别？",opts:["原核80S/真核70S","原核70S/真核80S","都是70S","都是80S"],answer:1,explain:"原核核糖体70S（游离胞质），真核细胞质80S（结合内质网）。"},
  {chapter:"真核微生物",q:"制备酵母菌原生质体用？",opts:["溶菌酶","纤维素酶","蜗牛消化酶","蛋白酶"],answer:2,explain:"蜗牛消化酶(heliase)破坏酵母菌细胞壁。"},
  {chapter:"真核微生物",q:"根霉区别于毛霉的特征是？",opts:["假根","子囊果","担子","孢子囊"],answer:0,explain:"根霉有假根和匍匐菌丝，毛霉无假根。"},
  // === 病毒 ===
  {chapter:"病毒",q:"病毒区别于细胞型生物的最主要特征是？",opts:["个体微小","能引起疾病","只含一种核酸","抗抗生素"],answer:2,explain:"病毒只含一种核酸(DNA或RNA)，细胞型生物同时含DNA和RNA。"},
  {chapter:"病毒",q:"T4噬菌体的核酸是？",opts:["单链RNA","双链RNA","单链DNA","双链DNA"],answer:3,explain:"T4噬菌体含双链DNA(dsDNA)，蝌蚪形复杂结构。"},
  {chapter:"病毒",q:"一步生长曲线三个时期是？",opts:["延滞对数稳定","潜伏裂解稳定","吸附侵入释放","迟滞指数衰亡"],answer:1,explain:"潜伏期、裂解期、稳定期。"},
  {chapter:"病毒",q:"整合在宿主染色体上的温和噬菌体DNA称？",opts:["病毒粒子","前噬菌体","类病毒","朊病毒"],answer:1,explain:"前噬菌体(prophage)是整合在溶源细胞染色体上的噬菌体核酸。"},
  {chapter:"病毒",q:"以下哪种属于亚病毒？",opts:["T4噬菌体","TMV","朊病毒","HIV"],answer:2,explain:"亚病毒：类病毒(RNA)、拟病毒、朊病毒（仅蛋白质）。"},
  {chapter:"病毒",q:"裂解量是指？",opts:["吸附率","每个细胞释放的新病毒数","死亡率","突变率"],answer:1,explain:"裂解量(burst size)=每个被感染细胞释放的新噬菌体平均数。"},
  {chapter:"病毒",q:"溶源性细菌的特性不包括？",opts:["免疫性","自发裂解","对同源噬菌体敏感","遗传性"],answer:2,explain:"溶源性细菌对同源噬菌体具有免疫性，不会被再次感染裂解。"},
  // === 营养 ===
  {chapter:"营养",q:"化能自养型微生物的能量来源是？",opts:["光能","有机物氧化","无机物氧化","ATP"],answer:2,explain:"化能自养通过氧化无机物（H₂、H₂S、NH₃等）获能，以CO₂为碳源。"},
  {chapter:"营养",q:"微生物吸收营养的主要方式是？",opts:["单纯扩散","促进扩散","主动运输","基团转位"],answer:2,explain:"主动运输逆浓度梯度，需载体和能量，是主要方式。"},
  {chapter:"营养",q:"哪种物质可通过单纯扩散进入细胞？",opts:["葡萄糖","氨基酸","甘油","核苷酸"],answer:2,explain:"单纯扩散仅限于水、CO₂、O₂、甘油、乙醇等。"},
  {chapter:"营养",q:"生长因子属于？",opts:["大量元素","微量有机物","无机盐","能源"],answer:1,explain:"生长因子是调节代谢必需的微量有机物，包括维生素、氨基酸等。"},
  {chapter:"营养",q:"鉴别培养基的用途是？",opts:["富集菌","区分菌落","提供营养","抑制杂菌"],answer:1,explain:"鉴别培养基含指示剂，通过显色反应区分不同菌落。"},
  {chapter:"营养",q:"牛肉膏蛋白胨培养基属于？",opts:["合成培养基","天然培养基","半合成培养基","鉴别培养基"],answer:1,explain:"由天然物质（牛肉膏、蛋白胨）配制，化学成分不完全清楚。"},
  {chapter:"营养",q:"基团转位中被运输糖类发生？",opts:["氧化","还原","磷酸化","脱氢"],answer:2,explain:"糖类被磷酸化（PEP提供磷酸基），属于基团转位。"},
  // === 代谢 ===

  {chapter:"代谢",q:"微生物特有的底物脱氢途径是？",opts:["EMP","HMP","ED途径","TCA"],answer:2,explain:"ED途径是微生物所特有的底物脱氢途径。"},

  {chapter:"代谢",q:"巴斯德效应指什么？",opts:["氧抑制发酵","葡萄糖抑制乳糖利用","温度抑制生长","pH抑制酶"],answer:0,explain:"氧气抑制酵母菌酒精发酵，称巴斯德效应。"},
  {chapter:"代谢",q:"固氮酶对什么敏感？",opts:["温度","pH","氧气","紫外线"],answer:2,explain:"固氮酶（MoFe蛋白+Fe蛋白）对氧极度敏感，遇氧失活。"},
  {chapter:"代谢",q:"TCA循环的主要作用是？",opts:["产大量ATP","合成氨基酸","代谢枢纽","产还原力"],answer:2,explain:"TCA循环是分解代谢和合成代谢连为一体的代谢枢纽。"},
  {chapter:"代谢",q:"青霉素抑制细菌的机制是？",opts:["抑制蛋白质合成","破坏细胞膜","抑制转肽酶","抑制DNA复制"],answer:2,explain:"青霉素是D-丙-D-丙结构类似物，抑制转肽酶，阻止肽聚糖交联。"},
  {chapter:"代谢",q:"乙醇发酵的产物是？",opts:["乳酸","乙醇+CO₂","乙酸","丁酸"],answer:1,explain:"酵母菌将葡萄糖→丙酮酸→乙醛→乙醇+CO₂。"},

// ===== INIT =====
function init(){
  document.getElementById('termTotal').textContent=TERMINOLOGY.length;
  renderLetterIndex(); renderTerms(); renderQA(); renderLatin();

}

// ===== PAGE SWITCH =====
function switchPage(p){
  state.page=p;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===p));
  document.querySelectorAll('.page').forEach(v=>v.classList.toggle('active',v.id==='page-'+p));
  if(p==='flashcard') initFC();
  if(p==='exam') startTimer();
  else if(p!=='quiz') stopTimer();
  if(p==='search') document.getElementById('globalSearch').focus();
  if(p==='quiz') renderQuiz();
}

// ===== FONT SIZE =====
function changeFontSize(d){
  state.fontSize=Math.max(12,Math.min(20,state.fontSize+d));
  localStorage.setItem('micro_fs',state.fontSize);
  document.querySelector('.notes-content').style.setProperty('--note-fs',state.fontSize+'px');
  document.querySelectorAll('.notes-content p').forEach(p=>p.style.fontSize=state.fontSize+'px');
}

function renderLetterIndex(){
  const l='ABCDEFGHJKLMNPQRSTWXYZ'.split('');
  document.getElementById('letterIndex').innerHTML='<span class="active" onclick="filterByLetter(this,\'\')">全部</span>'+l.map(l=>`<span onclick="filterByLetter(this,'${l}')">${l}</span>`).join('');
}
function filterByLetter(el,l){
  document.querySelectorAll('#letterIndex span').forEach(s=>s.classList.remove('active'));el.classList.add('active');
  const items=l?TERMINOLOGY.filter(t=>t.letter===l):TERMINOLOGY;
  renderTermList(items);
}
function renderTerms(){filterByLetter(document.querySelector('#letterIndex span'),'');}
function renderTermList(items){
  document.getElementById('termList').innerHTML=items.map((t,i)=>`<div class="term-card" onclick="toggleTerm(event,this)">
    <span class="term-check" onclick="event.stopPropagation();toggleLearned('${t.name}')">${state.learned.includes(t.name)?'✅':'⬜'}</span>
    <div><div class="term-name">${t.name}</div><div class="term-def">${t.def}</div></div>
  </div>`).join('');
}
function toggleTerm(e,el){if(e.target.classList.contains('term-check'))return;el.classList.toggle('expanded');}
function toggleLearned(name){
  const idx=state.learned.indexOf(name);
  if(idx>-1) state.learned.splice(idx,1);else state.learned.push(name);
  localStorage.setItem('micro_learned',JSON.stringify(state.learned));
  renderTerms();updateProgress();
}
function filterTerms(){
  const q=document.getElementById('termSearch').value.trim();
  const items=q?TERMINOLOGY.filter(t=>t.name.includes(q)||t.def.includes(q)):TERMINOLOGY;
  renderTermList(items);
  if(!q)document.querySelectorAll('#letterIndex span').forEach(s=>s.classList.remove('active'));
}

// ===== FLASHCARD =====
function setFCMode(m){
  state.fcMode=m;
  document.querySelectorAll('#fcMode .toggle-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  initFC();
}
function initFC(){
  state.fcItems=state.fcMode==='term'?TERMINOLOGY.map(t=>({front:t.name,back:t.def})):LATIN_NAMES.map(l=>({front:l.name,back:l.latin}));
  state.fcIdx=0;state.fcShuffled=[...state.fcItems];showFC();
}
function showFC(){
  document.getElementById('flashcard').classList.remove('flipped');
  const items=state.fcShuffled;if(!items.length)return;
  const item=items[state.fcIdx];
  document.getElementById('fcFrontLabel').textContent=state.fcMode==='term'?'名词':'中文名';
  document.getElementById('fcFront').textContent=item.front;
  document.getElementById('fcBackLabel').textContent=state.fcMode==='term'?'释义':'拉丁学名';
  document.getElementById('fcBack').textContent=item.back;
  document.getElementById('fcHint').textContent='点击翻转';
  document.getElementById('fcCounter').textContent=`${state.fcIdx+1}/${items.length}`;
  document.getElementById('fcProgressFill').style.width=`${((state.fcIdx+1)/items.length*100)}%`;
}
function nextCard(){if(state.fcIdx<state.fcShuffled.length-1){state.fcIdx++;showFC();}else if(state.fcAuto){state.fcIdx=0;showFC();}}
function prevCard(){if(state.fcIdx>0){state.fcIdx--;showFC();}}
function shuffleCards(){state.fcShuffled=[...state.fcItems].sort(()=>Math.random()-0.5);state.fcIdx=0;showFC();}
function toggleAutoPlay(){
  if(state.fcAuto){clearInterval(state.fcAuto);state.fcAuto=null;document.getElementById('fcAutoBtn').textContent='▶ 自动';document.getElementById('fcAutoBtn').classList.remove('active');}
  else{state.fcAuto=setInterval(()=>{nextCard();},3000);document.getElementById('fcAutoBtn').textContent='⏸ 暂停';document.getElementById('fcAutoBtn').classList.add('active');}
}

// ===== EXAM =====
function showExam(w){
  state.currentExam=w;
  document.querySelectorAll('#examToggle .toggle-btn').forEach((b,i)=>b.classList.toggle('active',i===['A','B','C'].indexOf(w)));
  const ex=EXAM_PAPERS[w];
  let html=`<h2 style="color:var(--primary);font-size:16px;margin-bottom:8px">${ex.name}</h2>`;
  ex.sections.forEach(sec=>{
    html+=`<div class="exam-section-title">${sec.title}</div>`;
    sec.items.forEach((item,i)=>{
      html+=`<div class="exam-question"><div class="exam-q-text">${item.q}</div>`;
      if(sec.type==='choice'&&item.opts){
        html+=`<div class="exam-options" id="examOpts_${w}_${i}">`;
        item.opts.forEach((o,j)=>{
          const correct=o===item.a||item.a.startsWith(o[0]);
          html+=`<div class="exam-opt" onclick="pickChoice(this,'${correct}')">${o}</div>`;
        });
        html+=`</div>`;
      }
      if(sec.type==='tf'){
        html+=`<div style="display:flex;gap:8px;margin:4px 0"><span class="exam-opt" onclick="pickChoice(this,'${item.a[0]==='√'}')">✅ 正确</span><span class="exam-opt" onclick="pickChoice(this,'${item.a[0]!=='√'}')">❌ 错误</span></div>`;
      }
      html+=`<button class="exam-show-btn" onclick="toggleAns(this)">📖 答案</button><div class="exam-answer">${item.a}</div></div>`;
    });
  });
  document.getElementById('examContent').innerHTML=html;
  resetTimer();
}
function toggleAns(btn){const a=btn.nextElementSibling;if(a.style.display==='block'){a.style.display='none';btn.textContent='📖 答案'}else{a.style.display='block';btn.textContent='📖 隐藏'}}
function pickChoice(el,correct){
  if(el.classList.contains('disabled'))return;
  el.classList.add(correct==='true'?'correct':'wrong','disabled');
  el.parentElement.querySelectorAll('.exam-opt').forEach(o=>o.classList.add('disabled'));
  if(correct!=='true')el.parentElement.querySelector('.exam-opt.correct')||[...el.parentElement.children].find(c=>c.classList.contains('disabled')&&correct!=='true'&&!c.classList.contains('wrong'));
}
function startTimer(){if(state.timerId)return;state.timerId=setInterval(()=>{state.timer++;const m=String(Math.floor(state.timer/60)).padStart(2,'0');const s=String(state.timer%60).padStart(2,'0');document.getElementById('examTimer').textContent=`⏱ ${m}:${s}`;},1000);}
function stopTimer(){if(state.timerId){clearInterval(state.timerId);state.timerId=null;}}
function resetTimer(){state.timer=0;document.getElementById('examTimer').textContent='⏱ 00:00';}

// ===== SEARCH =====
function globalSearch(){
  const q=document.getElementById('globalSearch').value.trim().toLowerCase();
  const el=document.getElementById('searchResults');
  if(!q){el.innerHTML='<div class="empty-state"><div class="icon">🔍</div>输入关键词搜索</div>';return;}
  let r=[];
  TERMINOLOGY.forEach(t=>{if(t.name.includes(q)||t.def.includes(q))r.push({title:t.name,snippet:t.def,source:'名词解释',page:'terminology'})});
  SHORT_QUESTIONS.forEach(s=>{if(s.q.includes(q)||s.a.includes(q))r.push({title:s.q.slice(0,40)+'...',snippet:s.a.slice(0,100),source:'简答题',page:'qa'})});
  LATIN_NAMES.forEach(l=>{if(l.name.includes(q)||l.latin.toLowerCase().includes(q))r.push({title:l.name,snippet:l.latin,source:'拉丁学名',page:'latin'})});
  if(r.length>50)r=r.slice(0,50);
  if(!r.length){el.innerHTML='<div class="empty-state"><div class="icon">😕</div>未找到结果</div>';return;}
  el.innerHTML=r.map(r=>`<div class="search-result" onclick="switchPage('${r.page}')"><div class="sr-source">${r.source}</div><div class="sr-title">${r.title.replace(new RegExp(q,'gi'),m=>'<mark>'+m+'</mark>')}</div><div class="sr-snippet">${r.snippet.slice(0,120).replace(new RegExp(q,'gi'),m=>'<mark>'+m+'</mark>')}</div></div>`).join('');
}

function renderNotes(){
  const html=`<div id="notesBody">
<h2>周德庆《微生物学教程》笔记</h2>
<p style="color:var(--text-light);font-size:13px">基于笔记+复习资料整理 · 覆盖全部8章</p>

<h3 id="ch1">第一章 微生物学概述</h3>
<p><b>微生物</b>：形体微小、结构简单的低等生物的通称。</p>
<p><b>五界系统</b>（Whittaker, 1969）：原核生物界、原生生物界、真菌界、动物界、植物界。</p>
<p><b>三域系统</b>（Woese）：细菌(Bacteria)、古生菌(Archaea)、真核生物(Eukarya)。</p>
<p><b>五大共性</b>：①体积小面积大 ②吸收快转化快 ③生长旺繁殖快 ④适应强易变异 ⑤分布广种类多</p>
<p><b>主要贡献</b>：列文虎克（首次发现微生物）、巴斯德（否定自然发生说、消毒法、疫苗）、科赫（纯培养技术、柯赫准则）、贝耶林克（固氮菌）、维诺格拉德斯基（化能自养）</p>
<p><b>柯赫准则</b>：①病原伴随病害存在 ②能分离纯培养 ③接种纯培养诱发原病害 ④重新分离同种病原</p>
<p><b>分类方法</b>：双名法（属名+种名+命名人）。分类单位：界门纲目科属种。分类方法：经典法、数值法、分子法（GC含量、核酸杂交、16S rRNA）。</p>

<h3 id="ch2">第二章 原核微生物</h3>
<h4>细菌</h4>
<p><b>形态</b>：球菌、杆菌、螺旋菌（弧菌/螺旋菌）。大小：0.5-1μm。</p>
<p><b>基本结构</b>：细胞壁、细胞膜、间体、核区、核糖体(70S)、细胞质。</p>
<p><b>特殊结构</b>：荚膜（保护/贮存）、鞭毛（运动）、芽孢（抗逆休眠体）、菌毛（附着）。</p>

<p><b>G⁺ vs G⁻ 细胞壁</b></p>
<table><tr><th>特征</th><th>G⁺菌</th><th>G⁻菌</th></tr>
<tr><td>厚度</td><td>30-40nm</td><td>8-10nm</td></tr>
<tr><td>肽聚糖含量</td><td>40-90%</td><td>5-10%</td></tr>
<tr><td>磷壁酸</td><td>有</td><td>无</td></tr>
<tr><td>脂多糖(LPS)</td><td>无</td><td>有（内毒素）</td></tr>
<tr><td>对青霉素</td><td>敏感</td><td>不敏感</td></tr></table>

<p><b>肽聚糖单体</b>：双糖单位（NAG-NAM）+ 短肽尾（L-Ala-D-Glu-L-Lys/L-DAP-D-Ala）+ 肽桥（G⁺为5Gly）。</p>
<p><b>革兰氏染色</b>：结晶紫→碘液→酒精脱色→番红复染。G⁺保留紫色，G⁻呈红色。</p>
<p><b>芽孢结构</b>：核心→核心壁→皮层→芽孢衣→孢外壁。含DPA-Ca，含水量低，抗逆性极强。</p>

<h4>放线菌</h4>
<p>丝状分枝细菌，产抗生素。菌丝分基内菌丝、气生菌丝、孢子丝。代表属：链霉菌（产90%抗生素）、小单孢菌、诺卡氏菌。</p>

<h4>其他原核微生物</h4>
<table><tr><th>类别</th><th>特点</th></tr>
<tr><td>立克次氏体</td><td>G⁻，专性活细胞内寄生，大小介于细菌和病毒之间</td></tr>
<tr><td>支原体</td><td>无细胞壁，膜含甾醇，最小细胞（0.2-0.25μm）</td></tr>
<tr><td>衣原体</td><td>G⁻，专性活细胞内寄生，"能量寄生物"</td></tr>
<tr><td>蓝细菌</td><td>含叶绿素a，放氧光合作用，原核"先锋生物"</td></tr>
<tr><td>蛭弧菌</td><td>寄生其他细菌导致裂解，G⁻，生物防治</td></tr></table>

<h3 id="ch3">第三章 真核微生物</h3>
<h4>酵母菌</h4>
<p>单细胞真菌，出芽繁殖。细胞壁含甘露聚糖。有性繁殖产生子囊孢子。</p>
<p><b>生活史类型</b>：①单倍体型（八孢裂殖酵母）②双倍体型（路德类酵母）③世代交替型（酿酒酵母）</p>
<p><b>菌落</b>：与细菌相似但大而厚，乳白色或红色，有酒香味。</p>

<h4>霉菌</h4>
<p>丝状真菌。菌丝分无隔（低等真菌：根霉、毛霉）和有隔（高等真菌：青霉、曲霉）。</p>
<p><b>无性孢子</b>：孢囊孢子、分生孢子、节孢子、厚垣孢子、游动孢子。</p>
<p><b>有性孢子</b>：卵孢子（壶菌门）、接合孢子（接合菌门）、子囊孢子（子囊菌门）、担孢子（担子菌门）。</p>

<h4>四类微生物菌落比较</h4>
<table><tr><th>特征</th><th>细菌</th><th>放线菌</th><th>酵母菌</th><th>霉菌</th></tr>
<tr><td>含水状态</td><td>湿润</td><td>干燥</td><td>较湿润</td><td>干燥</td></tr>
<tr><td>透明度</td><td>透明/稍透明</td><td>不透明</td><td>稍透明</td><td>不透明</td></tr>
<tr><td>颜色</td><td>多样</td><td>乳脂色/少数色</td><td>单调</td><td>多样</td></tr>
<tr><td>与培养基结合</td><td>不结合</td><td>牢固</td><td>不结合</td><td>较牢固</td></tr></table>

<h3 id="ch4">第四章 病毒</h3>
<p><b>特点</b>：①超显微(10-300nm) ②无细胞结构，一种核酸 ③专性活细胞内寄生 ④对抗生素不敏感，对干扰素敏感</p>
<p><b>病毒粒子结构</b>：核心（核酸）+ 衣壳（蛋白质）= 核衣壳 ± 包膜（脂蛋白）。对称体制：螺旋（TMV）、二十面体（腺病毒）、复合（T4噬菌体）。</p>
<p><b>T4噬菌体</b>：头部（二十面体，含dsDNA）+ 颈部 + 尾部（尾鞘/尾髓/尾丝/基板）。</p>
<p><b>繁殖周期</b>：吸附→侵入（注射DNA）→增殖（早/中/晚期转录）→装配→裂解释放。潜伏期→裂解期→稳定期。</p>
<p><b>一步生长曲线</b>：定量描述烈性噬菌体增殖规律。裂解量=每个被感染细胞释放的新噬菌体平均数。</p>
<p><b>温和噬菌体 vs 烈性噬菌体</b>：烈性→裂解细胞；温和→DNA整合（前噬菌体）→溶源性→随宿主同步复制。</p>
<p><b>亚病毒</b>：类病毒（仅RNA）、拟病毒、朊病毒（仅蛋白质，无核酸）。</p>

<h3 id="ch5">第五章 微生物营养</h3>
<p><b>六大营养物</b>：碳源、氮源、能源、生长因子、无机盐、水。</p>
<p><b>四种营养类型</b>：</p>
<table><tr><th>类型</th><th>能源</th><th>碳源</th><th>电子供体</th><th>举例</th></tr>
<tr><td>光能自养</td><td>光能</td><td>CO₂</td><td>H₂O/H₂S</td><td>蓝细菌、藻类</td></tr>
<tr><td>光能异养</td><td>光能</td><td>有机物/CO₂</td><td>简单有机物</td><td>红螺菌</td></tr>
<tr><td>化能自养</td><td>无机氧化</td><td>CO₂</td><td>H₂/H₂S/Fe²⁺</td><td>硝化细菌、硫化细菌</td></tr>
<tr><td>化能异养</td><td>有机物</td><td>有机物</td><td>有机物</td><td>大多数细菌、真菌</td></tr></table>

<p><b>四种运输方式</b>：①单纯扩散（不耗能，顺梯度）②促进扩散（载体，顺梯度）③主动运输（载体，逆梯度，耗能）④基团转位（PTS系统，磷酸化）。</p>
<p><b>培养基原则</b>：目的明确、营养协调（C/N=100/0.5-2）、条件适宜（pH/渗透压/aw/Eh）、经济节约。</p>

<h3 id="ch6">第六章 微生物代谢</h3>
<p><b>产能途径</b>：</p>
<table><tr><th>途径</th><th>产物</th><th>ATP</th><th>特点</th></tr>
<tr><td>EMP</td><td>丙酮酸+NADH₂</td><td>2</td><td>普遍存在</td></tr>
<tr><td>HMP</td><td>NADPH₂+磷酸糖</td><td>1</td><td>提供碳架和还原力</td></tr>
<tr><td>ED</td><td>丙酮酸+GAP</td><td>1</td><td>微生物特有，细菌酒精发酵</td></tr>
<tr><td>TCA</td><td>CO₂+H₂O+大量ATP</td><td>24</td><td>代谢枢纽</td></tr></table>

<p><b>生物氧化三种类型</b>：</p>
<ul>
<li><b>发酵</b>：无氧，底物水平磷酸化，有机物为最终氢受体，产2ATP</li>
<li><b>有氧呼吸</b>：有氧，氧化磷酸化，O₂为最终氢受体，产38ATP</li>
<li><b>无氧呼吸</b>：无氧，氧化磷酸化，NO₃⁻/SO₄²⁻/CO₂为最终受体，产少量ATP</li>
</ul>
<p><b>无氧呼吸电子受体</b>：反硝化→NO₃⁻；硫酸盐还原→SO₄²⁻；产甲烷→CO₂；延胡索酸还原→延胡索酸。</p>

<p><b>发酵类型</b>：</p>
<table><tr><th>类型</th><th>产物</th><th>微生物</th></tr>
<tr><td>乙醇发酵</td><td>乙醇+CO₂</td><td>酵母菌</td></tr>
<tr><td>同型乳酸发酵</td><td>乳酸</td><td>乳杆菌</td></tr>
<tr><td>异型乳酸发酵</td><td>乳酸+乙醇+CO₂</td><td>明串珠菌</td></tr>
<tr><td>丁酸发酵</td><td>丁酸/丁醇/丙酮</td><td>梭菌</td></tr>
<tr><td>混合酸发酵</td><td>乳酸+乙醇+乙酸+CO₂+H₂</td><td>大肠杆菌</td></tr></table>

<p><b>生物固氮</b>：N₂ + 8[H] + 18~24ATP → 2NH₃ + H₂ + 18~24ADP + 18~24Pi。需固氮酶（MoFe蛋白+Fe蛋白）、ATP、还原力、严格厌氧。</p>
<p><b>肽聚糖合成三阶段</b>：①细胞质（Park核苷酸）②细胞膜（与细菌萜醇结合→双糖肽亚单位）③细胞膜外（转糖基→转肽交联）。青霉素抑制转肽酶。</p>
<p><b>巴斯德效应</b>：酵母菌酒精发酵时通入氧气，发酵减慢，停止产乙醇，葡萄糖消耗速率下降。</p>

<h3 id="ch7">第七章 微生物生长</h3>
<p><b>生长曲线四阶段</b>：</p>
<table><tr><th>时期</th><th>菌数</th><th>特点</th><th>应用</th></tr>
<tr><td>延滞期</td><td>几乎不变</td><td>代谢活跃，体积增大</td><td>尽量缩短</td></tr>
<tr><td>对数期</td><td>几何级数增</td><td>代时稳定，代谢最强</td><td>研究/接种材料</td></tr>
<tr><td>稳定期</td><td>动态平衡</td><td>菌量最大，积累次生代谢物</td><td>收获菌体/产物</td></tr>
<tr><td>衰亡期</td><td>指数下降</td><td>细胞自溶，畸形</td><td>及时放罐</td></tr></table>

<p><b>连续培养</b>：恒浊法（收获菌体）、恒化法（科研，限制性因子）。</p>
<p><b>同步生长</b>：机械法（离心/过滤/膜法）、诱导法（温度/营养调整）、抑制DNA合成法。</p>
<p><b>环境因素</b>：温度（嗜冷<20℃/嗜温20-45℃/嗜热>45℃）、pH（细菌6.5-7.5/放线菌7.5-8/霉菌5-6）、氧气（好氧/厌氧/兼性/微好氧）、辐射、渗透压。</p>

<p><b>微生物与氧的关系</b>：</p>
<table><tr><th>类型</th><th>特点</th><th>举例</th></tr>
<tr><td>专性好氧</td><td>必须有氧</td><td>固氮菌属</td></tr>
<tr><td>兼性厌氧</td><td>有氧无氧均可</td><td>酿酒酵母、大肠杆菌</td></tr>
<tr><td>微好氧</td><td>低氧浓度</td><td>霍乱弧菌</td></tr>
<tr><td>耐氧</td><td>有氧无氧都发酵</td><td>乳酸乳杆菌</td></tr>
<tr><td>专性厌氧</td><td>严格无氧</td><td>梭菌属、产甲烷菌</td></tr></table>

<p><b>灭菌与消毒</b>：灭菌（杀灭所有微生物）、消毒（杀灭病原体）、防腐（抑制生长）、化疗（选择性毒力）。</p>
<p><b>抗生素作用位点</b>：抑制细胞壁合成（青霉素）、影响细胞膜（多烯类）、干扰蛋白合成（链霉素）、阻碍核酸合成（利福平）。</p>

<h3 id="ch8">第八章 微生物遗传</h3>
<p><b>DNA是遗传物质的证明</b>：Griffith-Avery转化实验(1928-1944)、Hershey-Chase噬菌体实验(1952)、Fraenkel-Conrat病毒重建实验(1956)。</p>
<p><b>质粒</b>：染色体外自主复制的小型闭合环状DNA。F因子（致育因子）、R因子（耐药性）、Col因子（大肠杆菌素）、Ti质粒（诱癌）、降解质粒。</p>
<p><b>基因突变特点</b>：不对应性、自发性、稀有性、独立性、诱变性、稳定性、可逆性。</p>
<p><b>自发性证明</b>：变量试验(Luria-Delbrück)、涂布试验(Newcombe)、影印培养试验(Lederberg)。</p>
<p><b>DNA损伤修复</b>：光复活（可见光）、切除修复（暗修复，不产生突变）、重组修复（复制后，不产生突变）、SOS修复（易误修复，产生突变）。</p>
<p><b>原核基因重组</b>：转化（游离DNA）、转导（噬菌体媒介）、接合（性菌毛，F⁺/F⁻/Hfr/F'）、原生质体融合。</p>
<p><b>F因子四种菌株</b>：F⁺（有质粒，雄性）、F⁻（无质粒，雌性）、Hfr（F整合到染色体，高频重组）、F'（携带染色体基因的F因子）。</p>
<p><b>准性生殖</b>：菌丝联结→质配→异核体→核配→体细胞交换和单倍体化。区别于有性生殖：无减数分裂。</p>
<p><b>菌种保藏</b>：低温、干燥、隔绝空气、冷冻干燥（最常用）。我国机构：CCCCM（中科院微生物所等）。</p>

<h3 id="ch9">第九章 微生物生态</h3>
<p><b>微生物间关系</b>：互生（双方有利，如根际微生物）、共生（紧密结合，如地衣=藻+真菌）、寄生（病原体）、拮抗（抗生素）、捕食（原生动物吞细菌）。</p>

<p><b>碳循环</b>：光合作用固定CO₂→有机物→微生物分解→CO₂回归大气。90%的CO₂由微生物代谢产生。</p>
<p><b>氮循环</b>：固氮(N₂→NH₃)→氨化(有机N→NH₃)→硝化(NH₃→NO₃⁻)→反硝化(NO₃⁻→N₂)。</p>

<table><tr><th>过程</th><th>反应</th><th>微生物</th></tr>
<tr><td>固氮</td><td>N₂→NH₃</td><td>固氮菌、根瘤菌</td></tr>
<tr><td>氨化</td><td>有机N→NH₃</td><td>腐败微生物</td></tr>
<tr><td>硝化</td><td>NH₃→NO₂⁻→NO₃⁻</td><td>亚硝化菌→硝化菌</td></tr>
<tr><td>反硝化</td><td>NO₃⁻→NO₂⁻→N₂</td><td>反硝化细菌</td></tr>
<tr><td>硫化</td><td>H₂S→S→SO₄²⁻</td><td>硫化细菌</td></tr>
<tr><td>反硫化</td><td>SO₄²⁻→H₂S</td><td>反硫化细菌</td></tr></table>

<p><b>废水处理</b>：活性污泥法（好氧，絮凝团）、生物膜法（滴滤池）、沼气发酵（厌氧产甲烷）。</p>
<p><b>水质指标</b>：BOD₅（五日生化需氧量）、COD（化学需氧量）。饮用水标准：细菌<100个/mL，大肠杆菌<3个/L。</p>
<p><b>生物修复</b>：利用微生物降解环境污染物。如假单胞菌降解芳香烃、汞甲基化/还原。</p>

  const el=document.getElementById('notesContent');

}

  let pool = ch ? QUESTIONS.filter(q=>q.chapter===ch) : [...QUESTIONS];
  document.getElementById('quizPoolInfo').textContent = `题库共 ${QUESTIONS.length} 题${ch?'（已筛选 '+pool.length+' 题）':''}`;
  let selected = [...pool];
  if(count>0 && selected.length>count) selected.sort(()=>Math.random()-0.5).splice(count);
  if(quizMode) renderQuizMode(selected);
  else renderQuizBrowse(selected);
}

function renderQuizBrowse(items){
  const el = document.getElementById('quizList');
  document.getElementById('quizProgressWrap').style.display='none';
  const stats = getQuizStats();
  let totalQ=Object.keys(stats).length, correctQ=Object.values(stats).filter(v=>v).length;
  document.getElementById('quizStats').innerHTML = `<span class="quiz-stat">📊 已答 <b>${totalQ}</b> 题 · 正确 <b style="color:var(--success)">${correctQ}</b> 题 · 正确率 <b>${totalQ?Math.round(correctQ/totalQ*100):0}%</b></span>`;
  el.innerHTML = items.map((q,i)=>renderQuizCard(q,i)).join('');
}

function renderQuizMode(items){
  const el = document.getElementById('quizList');
  if(!items.length){el.innerHTML='<div class="empty-state"><div class="icon">📝</div>无题目</div>';return;}
  const total = items.length;
  const done = items.filter(q=>quizAnswers[q.q]!==undefined).length;
  document.getElementById('quizProgressWrap').style.display='block';
  document.getElementById('quizProgressFill').style.width = `${total?Math.round(done/total*100):0}%`;
  document.getElementById('quizStats').innerHTML = `<span class="quiz-stat">📊 进度 <b>${done}/${total}</b> · 正确率 <b>${total?Math.round(done/total*100):0}%</b></span>`;
  el.innerHTML = items.map((q,i)=>renderQuizCard(q,i)).join('');
  // scroll to first unanswered
  const first = el.querySelector('.quiz-card:not(.correct):not(.wrong)');
  if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
}

function renderQuizCard(q,i){
  const userAns = quizAnswers[q.q];
  const isCorrect = userAns===q.answer;
  const answered = userAns!==undefined;
  let cls = 'card quiz-card';
  if(answered) cls += isCorrect ? ' correct' : ' wrong';
  const optsHtml = q.opts.map((o,j)=>{
    let optCls = 'quiz-opt';
    if(answered){
      if(j===q.answer) optCls += ' show-correct';
      if(j===userAns && j!==q.answer) optCls += ' selected-wrong';
      if(j===userAns && j===q.answer) optCls += ' selected-correct';
      optCls += ' disabled';
    }
    return `<div class="${optCls}" onclick="${answered?'':'checkQuiz(this,'+i+','+q.answer+')'}">${String.fromCharCode(65+j)}. ${o}</div>`;
  }).join('');
  return `<div class="${cls}">
    <div class="quiz-q-chapter">📌 ${q.chapter}</div>
    <div class="quiz-q-num">第 ${i+1} 题</div>
    <div class="quiz-q-text">${q.q}</div>
    ${optsHtml}
    <div class="quiz-explain ${answered?'show':''}">💡 ${q.explain}</div>
  </div>`;
}

function checkQuiz(el,i,correctIdx){
  const card = el.closest('.quiz-card');
  const opts = card.querySelectorAll('.quiz-opt');
  const selectedIdx = [...opts].indexOf(el);
  const correct = selectedIdx===correctIdx;
  // disable all
  opts.forEach(o=>o.classList.add('disabled'));
  // mark selected
  el.classList.add(correct?'selected-correct':'selected-wrong');
  // show correct
  opts[correctIdx].classList.add('show-correct');
  // show explanation
  card.querySelector('.quiz-explain').classList.add('show');
  // mark card
  card.classList.add(correct?'correct':'wrong');
  // save
  const qText = card.querySelector('.quiz-q-text').textContent;
  quizAnswers[qText] = selectedIdx;
  localStorage.setItem('micro_quiz',JSON.stringify(quizAnswers));
  // update stats
  updateQuizStats();
}

function getQuizStats(){
  const stats = {};
  Object.keys(quizAnswers).forEach(q=>{
    const question = QUESTIONS.find(x=>x.q===q);
    if(question) stats[q] = quizAnswers[q]===question.answer;
  });
  return stats;
}

function updateQuizStats(){
  const stats = getQuizStats();
  const total = Object.keys(stats).length;
  const correct = Object.values(stats).filter(v=>v).length;
  document.getElementById('quizStats').innerHTML = `<span class="quiz-stat">📊 已答 <b>${total}</b> 题 · 正确 <b style="color:var(--success)">${correct}</b> 题 · 正确率 <b>${total?Math.round(correct/total*100):0}%</b></span>`;
  if(quizMode){
    const items = document.querySelectorAll('#quizList .quiz-card');
    const done = [...items].filter(c=>c.classList.contains('correct')||c.classList.contains('wrong')).length;
    document.getElementById('quizProgressFill').style.width = `${items.length?Math.round(done/items.length*100):0}%`;
  }
}

function toggleQuizMode(){
  quizMode = !quizMode;
  document.getElementById('quizModeBtn').textContent = quizMode ? '📖 浏览模式' : '🎯 答题模式';
  document.getElementById('quizModeBtn').style.background = quizMode ? '#27ae60' : '#e67e22';
  renderQuiz();
}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&state.page==='flashcard')nextCard();
  if(e.key==='ArrowLeft'&&state.page==='flashcard')prevCard();
  if(e.key===' '&&state.page==='flashcard'){e.preventDefault();document.getElementById('flashcard').classList.toggle('flipped');}
});

// ===== START =====
init();
</script>
</body>
</html>
