<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微生物学复习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f6f9;--card:#fff;--text:#1a2332;--text2:#6b7a8f;--border:#e8ecf1;--primary:#2563eb;--primary-light:#dbeafe;--accent:#f59e0b;--success:#10b981;--danger:#ef4444;--shadow:0 1px 3px rgba(0,0,0,.06);--radius:10px;--radius-sm:8px}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;height:100vh;overflow:hidden}
.dark{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.2)}

/* App shell */
.app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto}
.header{display:flex;align-items:center;padding:12px 16px;gap:8px;flex-shrink:0}
.header h1{font-size:17px;font-weight:700;flex:1}
.header-btn{width:32px;height:32px;border:none;background:var(--card);border-radius:var(--radius-xs);cursor:pointer;font-size:16px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .15s}

/* Nav bar */
.nav{display:flex;padding:0 12px 8px;gap:4px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;font-size:11px;color:var(--text2);transition:all .15s;min-width:56px;border:none;background:none;flex-shrink:0}
.nav-item .icon{font-size:18px}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item:hover{background:var(--border)}

/* Pages */
.main{flex:1;overflow:hidden;position:relative}
.page{display:none;height:100%;overflow-y:auto;padding:0 16px 16px}
.page.active{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Cards */
.card{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;margin-bottom:6px}
.card-text{font-size:13px;color:var(--text2);line-height:1.6}

/* Search */
.search-wrap{position:sticky;top:0;z-index:10;padding:8px 0 10px;background:var(--bg)}
.search-wrap input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:var(--card);color:var(--text);transition:border-color .15s}
.search-wrap input:focus{border-color:var(--primary)}

/* Dashboard */
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dash-card{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:14px;cursor:pointer;transition:transform .1s;text-align:center}
.dash-card:active{transform:scale(.97)}
.dash-card .icon{font-size:24px;margin-bottom:4px}
.dash-card .label{font-size:12px;color:var(--text2)}
.dash-card .count{font-size:20px;font-weight:700;color:var(--primary)}
.dash-progress{margin-top:4px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.dash-progress .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}

/* Term list */
.term-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.term-item:last-child{border-bottom:none}
.term-check{width:20px;text-align:center;cursor:pointer;font-size:15px;flex-shrink:0;margin-top:1px}
.term-name{font-weight:600;font-size:14px}
.term-def{font-size:13px;color:var(--text2);margin-top:3px;display:none;line-height:1.6;padding-right:4px}
.term-item.open .term-def{display:block}
.letter-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.letter-tabs span{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text2);box-shadow:var(--shadow)}
.letter-tabs span.active{background:var(--primary);color:#fff}

/* Q&A */
.qa-q{font-weight:600;font-size:14px;cursor:pointer;padding:6px 0}
.qa-a{font-size:13px;color:var(--text2);padding:8px 12px;background:var(--bg);border-radius:8px;margin-top:4px;display:none;line-height:1.7}
.qa-item.open .qa-a{display:block}

/* Quiz */
.quiz-opt{display:block;width:100%;text-align:left;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:13px;margin-bottom:5px;transition:all .1s;color:var(--text)}
.quiz-opt:hover{border-color:var(--primary)}
.quiz-opt.selected-correct{background:#ecfdf5;border-color:var(--success);color:var(--success)}
.quiz-opt.selected-wrong{background:#fef2f2;border-color:var(--danger);color:var(--danger)}
.quiz-opt.show-correct{background:#ecfdf5;border-color:var(--success)}
.quiz-opt.disabled{pointer-events:none;opacity:.6}
.quiz-chapter{font-size:11px;color:var(--primary);margin-bottom:2px}
.quiz-progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:8px 0}
.quiz-progress-bar .fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.quiz-stats{font-size:12px;color:var(--text2);margin:6px 0}

/* Latin */
.latin-item{padding:8px 12px;background:var(--card);border-radius:8px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:4px}
.latin-item .la{color:var(--primary);font-style:italic;font-weight:600}
.latin-item .badge{font-size:10px;padding:2px 6px;border-radius:4px}
.latin-item .badge.red{background:#fef2f2;color:#dc2626}
.latin-item .badge.blue{background:#dbeafe;color:#2563eb}

/* Exam */
.exam-section{margin:12px 0 8px;font-weight:600;font-size:14px;color:var(--primary)}
.exam-q{padding:6px 0}
.exam-answer{display:none;padding:6px 10px;background:#ecfdf5;border-radius:6px;margin-top:4px;font-size:13px;color:var(--success)}
.exam-show-btn{font-size:12px;color:var(--primary);cursor:pointer;background:none;border:none;padding:2px 0}

/* Notes */
.notes-content{font-size:14px;line-height:1.8;padding-bottom:20px}
.notes-content h2{font-size:17px;margin:18px 0 8px;color:var(--text)}
.notes-content h3{font-size:15px;margin:14px 0 6px;color:var(--primary)}
.notes-content p{margin:5px 0}
.notes-content table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.notes-content td,.notes-content th{border:1px solid var(--border);padding:5px 6px}
.notes-content th{background:var(--primary);color:#fff;font-weight:600}
.notes-content tr:nth-child(even){background:var(--bg)}
.chapter-nav{display:flex;gap:4px;flex-wrap:wrap;padding:6px 0;margin:6px 0}
.chapter-nav button{padding:3px 10px;border:1px solid var(--border);border-radius:12px;font-size:11px;cursor:pointer;background:var(--card);color:var(--text2)}

/* Responsive */
@media(min-width:600px){.dashboard{grid-template-columns:1fr 1fr 1fr}}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-green{background:#ecfdf5;color:#059669}
.tag-blue{background:#eef0fa;color:var(--primary);font-weight:600}
.tag-orange{background:#fffbeb;color:#d97706}

/* Empty state */
.empty{padding:40px 20px;text-align:center;color:var(--text2)}
.empty .icon{font-size:36px;margin-bottom:8px;opacity:.5}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🦠 微生物学</h1>
    <button class="header-btn" onclick="toggleDark()" title="夜间模式">🌙</button>
    <button class="header-btn" onclick="switchPage('search')" title="搜索">🔍</button>
  </div>
  <div class="nav" id="nav">
    <button class="nav-item active" data-page="home" onclick="switchPage('home')"><span class="icon">🏠</span>首页</button>
    <button class="nav-item" data-page="terms" onclick="switchPage('terms')"><span class="icon">📝</span>名词</button>
    <button class="nav-item" data-page="qa" onclick="switchPage('qa')"><span class="icon">❓</span>简答</button>
    <button class="nav-item" data-page="quiz" onclick="switchPage('quiz')"><span class="icon">✏️</span>刷题</button>
    <button class="nav-item" data-page="latin" onclick="switchPage('latin')"><span class="icon">🔬</span>拉丁名</button>
    <button class="nav-item" data-page="notes" onclick="switchPage('notes')"><span class="icon">📖</span>笔记</button>
  </div>
  <div class="main">
    <!-- 首页 -->
    <div class="page active" id="page-home">
      <div class="dashboard" id="dashCards"></div>
      <div class="card" style="text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:8px">🦠</div>
        <div style="font-weight:600;font-size:15px">微生物学期末复习</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">周德庆《微生物学教程》</div>
        <div id="dashProgress" style="margin-top:10px;font-size:13px;color:var(--text2)"></div>
      </div>
      <div class="card">
        <div class="card-title">📋 快速导航</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">
          <button class="nav-item" onclick="switchPage('notes')" style="width:100%;padding:10px;background:var(--bg);border-radius:8px;border:none;font-size:13px;cursor:pointer">📖 浏览笔记</button>
          <button class="nav-item" onclick="switchPage('terms')" style="width:100%;padding:10px;background:var(--bg);border-radius:8px;border:none;font-size:13px;cursor:pointer">📝 背名词</button>
          <button class="nav-item" onclick="randomQA()" style="width:100%;padding:10px;background:var(--bg);border-radius:8px;border:none;font-size:13px;cursor:pointer">🎲 随机问答</button>
          <button class="nav-item" onclick="switchPage('quiz')" style="width:100%;padding:10px;background:var(--bg);border-radius:8px;border:none;font-size:13px;cursor:pointer">✏️ 刷选择题</button>
        </div>
      </div>
    </div>

    <!-- 名词页 -->
    <div class="page" id="page-terms">
      <div class="search-wrap"><input type="text" id="termSearch" placeholder="搜索名词..." oninput="filterTerms()"></div>
      <div class="letter-tabs" id="letterTabs"></div>
      <div id="termList"></div>
    </div>

    <!-- 简答页 -->
    <div class="page" id="page-qa">
      <div class="search-wrap"><input type="text" id="qaSearch" placeholder="搜索题目..." oninput="filterQA()"></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px" id="qaTopics"></div>
      <div id="qaList"></div>
    </div>

    <!-- 刷题页 -->
    	    <div class="page" id="page-quiz">
	      <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
	        <button id="modePractice" onclick="setQuizMode('practice')" style="padding:6px 14px;border:1.5px solid var(--primary);border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:12px;font-weight:600">刷题模式</button>
	        <button id="modeChallenge" onclick="setQuizMode('challenge')" style="padding:6px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--text2);cursor:pointer;font-size:12px">闯关模式</button>
	      </div>
	      <div id="quizPanel"></div>
	    </div>

    <!-- 拉丁名页 -->
    <div class="page" id="page-latin">
      <div class="search-wrap"><input type="text" id="latinSearch" placeholder="搜索拉丁名或中文名..." oninput="filterLatin()"></div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px" id="latinGroups"></div>
      <div id="latinList"></div>
    </div>

    <!-- 笔记页 -->
    <div class="page" id="page-notes">
      <div class="search-wrap"><input type="text" id="notesSearch" placeholder="搜索笔记..." oninput="filterNotes()"></div>
      <div class="chapter-nav" id="chapterNav"></div>
      <div class="notes-content" id="notesContent">加载中...</div>
    </div>

    <!-- 搜索页 -->
    <div class="page" id="page-search">
      <div class="search-wrap"><input type="text" id="globalSearch" placeholder="搜索所有内容..." oninput="globalSearch()" autofocus></div>
      <div id="searchResults"></div>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const DATA = {
  terms: [
    {n:"氨基酸异养型微生物",d:"利用非氨基酸类简单氮源自行合成一切氨基酸",l:"A"},
    {n:"氨化作用",d:"含氮有机物经微生物分解产生氨",l:"A"},
    {n:"伴胞晶体",d:"芽孢杆菌形成芽孢时产生的菱形碱溶性蛋白晶体，对昆虫有毒杀作用",l:"B"},
    {n:"鞭毛",d:"细菌表面的长丝状波曲蛋白质，运动器官",l:"B"},
    {n:"病毒",d:"只含一种核酸、专性活细胞内寄生的超显微非细胞结构分子生物",l:"B"},
    {n:"巴斯德效应",d:"酵母菌酒精发酵时通入氧气，发酵减慢，氧对发酵的抑制现象",l:"B"},
    {n:"半合成培养基",d:"化学试剂配制的含天然成分的培养基",l:"B"},
    {n:"变异",d:"遗传物质结构和数量的改变",l:"B"},
    {n:"发酵",d:"底物脱氢后不经呼吸链传递，最终被外源性氢受体接受的低效产能反应",l:"F"},
    {n:"防腐",d:"抑制霉腐微生物生长繁殖的措施",l:"F"},
    {n:"反硝化作用",d:"反硝化细菌将硝酸盐还原成氮气的过程",l:"F"},
    {n:"共生关系",d:"两种生物紧密依赖、互相协作、不可分离的关系",l:"G"},
    {n:"基因突变",d:"细胞内遗传物质的分子结构或数量突然发生的可遗传变化",l:"J"},
    {n:"荚膜",d:"细菌细胞壁外有明显界限的胶状物质层，主要成分为多糖或多肽",l:"J"},
    {n:"菌落",d:"单个细胞在固体培养基上繁殖形成的肉眼可见的子细胞集团",l:"J"},
    {n:"菌毛",d:"细菌体表的纤细中空短直蛋白质附属物，附着功能",l:"J"},
    {n:"接合",d:"F质粒通过性菌毛直接接触传递的遗传重组方式",l:"J"},
    {n:"抗生素",d:"低浓度抑制其他微生物生长的微生物次生代谢产物",l:"K"},
    {n:"抗原",d:"能诱导机体产生免疫应答并与相应抗体特异性结合的物质",l:"K"},
    {n:"抗体",d:"浆细胞产生的能与相应抗原特异性结合的免疫球蛋白",l:"K"},
    {n:"烈性噬菌体",d:"侵入敏感细菌后迅速增殖并引起宿主细胞裂解的噬菌体",l:"L"},
    {n:"灭菌",d:"杀死所有微生物（含芽孢）的措施",l:"M"},
    {n:"内毒素",d:"G-菌外壁层中的脂多糖(LPS)，细菌溶解时释放",l:"N"},
    {n:"培养基",d:"人工配制的供微生物生长繁殖用的营养基质",l:"P"},
    {n:"前噬菌体",d:"整合在溶源细胞染色体上的噬菌体核酸",l:"Q"},
    {n:"溶源性",d:"温和噬菌体DNA整合到宿主基因组并同步复制，不裂解细胞",l:"R"},
    {n:"朊病毒",d:"不含核酸的传染性蛋白质分子，可引起同类蛋白构象变化",l:"R"},
    {n:"噬菌体",d:"原核生物的病毒",l:"S"},
    {n:"生物固氮",d:"分子氮通过固氮酶催化形成氨的过程",l:"S"},
    {n:"生长因子",d:"调节代谢必需的微量有机物",l:"S"},
    {n:"生长曲线",d:"以菌数对数为纵坐标、时间为横坐标的有规律曲线",l:"S"},
    {n:"碳源",d:"构成微生物细胞碳架来源的营养物质",l:"T"},
    {n:"微生物",d:"所有个体微小、结构简单的低等生物总称",l:"W"},
    {n:"温和噬菌体",d:"不裂解细胞、DNA整合到宿主基因组的噬菌体",l:"W"},
    {n:"芽孢",d:"某些细菌在后期形成的圆形或椭圆形抗逆性休眠体",l:"Y"},
    {n:"原生质体",d:"人工除去细菌细胞壁后剩下的缺壁细胞",l:"Y"},
    {n:"转化",d:"受体菌直接吸收供体菌DNA片段获得新遗传性状",l:"Z"},
    {n:"转导",d:"缺陷噬菌体为媒介转移供体菌DNA到受体菌",l:"Z"},
    {n:"真菌",d:"有细胞壁无叶绿体以孢子繁殖的真核微生物",l:"Z"},
    {n:"支原体",d:"无细胞壁、细胞膜含甾醇的最小原核生物",l:"Z"},
    {n:"正常菌群",d:"健康动物体内外数量大种类稳定且无害的微生物群",l:"Z"},
  ],
  qa: [
    {t:"细胞结构",q:"G+菌和G-菌细胞壁有何区别？",a:"G+：厚(30-40nm)、肽聚糖含量高(40-90%)、含磷壁酸。G-：薄(8-10nm)、肽聚糖含量低(5-10%)、含脂多糖(LPS)和膜蛋白。"},
    {t:"细胞结构",q:"革兰氏染色的原理？",a:"G+菌肽聚糖含量高，酒精脱色时失水网孔缩小，结晶紫-碘复合物保留呈紫色。G-菌含脂量高，酒精溶解脂类，结晶紫-碘复合物溶出，脱色后复染呈红色。"},
    {t:"微生物学史",q:"巴斯德和科赫的主要贡献？",a:"巴斯德：证实发酵实质、否定自然发生说（鹅颈瓶实验）、巴斯德消毒法、疫苗。科赫：分离纯化技术、固体培养基、细菌染色、柯赫准则。"},
    {t:"真菌",q:"真菌的无性孢子和有性孢子类型？",a:"无性孢子：节孢子、厚垣孢子、分生孢子、孢囊孢子、游动孢子。有性孢子：卵孢子、接合孢子、子囊孢子、担孢子。"},
    {t:"病毒",q:"T4噬菌体的结构和繁殖过程？",a:"结构：头部（内含DNA）+颈部+尾部（尾鞘、尾髓、尾丝）。繁殖：吸附→侵入（注射DNA）→增殖→装配→释放（裂解）。"},
    {t:"病毒",q:"温和噬菌体与烈性噬菌体的区别？",a:"烈性噬菌体侵入后迅速增殖并裂解细胞。温和噬菌体DNA整合到宿主染色体形成前噬菌体，随宿主复制而不裂解细胞（溶源性）。"},
    {t:"营养",q:"微生物四种营养类型？",a:"光能自养（蓝细菌）、光能异养（红螺菌）、化能自养（硝化细菌）、化能异养（大多数微生物）。"},
    {t:"营养",q:"四种物质运输方式的特点？",a:"单纯扩散（顺梯度、不耗能、无载体）、促进扩散（顺梯度、不耗能、有载体）、主动运输（逆梯度、耗能、有载体，主要方式）、基团转位（逆梯度、耗能、磷酸化）。"},
    {t:"代谢",q:"比较有氧呼吸、无氧呼吸、发酵？",a:"发酵无氧，底物水平磷酸化，有机物为受体，产2ATP。有氧呼吸有氧，氧化磷酸化，O₂为受体，产38ATP。无氧呼吸无氧，氧化磷酸化，NO₃⁻/SO₄²⁻/CO₂为受体。"},

// ===== STATE =====
const S = {
  learned: JSON.parse(localStorage.getItem('ml')||'[]'),
  dark: localStorage.getItem('md')==='true',
  qAnswers: JSON.parse(localStorage.getItem('mq')||'{}'),
  page: 'home'
};

// ===== HELPERS =====
const $ = id => document.getElementById(id);
const qs = (s,d)=> (d||document).querySelector(s);
const qsa = (s,d)=> [...(d||document).querySelectorAll(s)];

// ===== INIT =====
function init() {
  if(S.dark) document.body.classList.add('dark');
  renderHome();
  renderLetterTabs();
  renderTerms();
  renderQA();
  renderLatin();
  renderNotes();
}
init();

// ===== DARK MODE =====
function toggleDark() {
  S.dark = !S.dark;
  document.body.classList.toggle('dark');
  localStorage.setItem('md', S.dark);
}

// ===== PAGE SWITCH =====
function switchPage(p) {
  S.page = p;
  qsa('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === p));
  qsa('.page').forEach(v => v.classList.toggle('active', v.id === 'page-'+p));
  if(p==='quiz') showPracticeMode();
  if(p==='search') $('globalSearch').focus();
  if(p==='home') renderHome();
}

// ===== HOME =====
function renderHome() {
  const lt = DATA.terms.length, ll = S.learned.length, lq = Object.keys(S.qAnswers).length;
  const lc = Object.keys(S.qAnswers).filter(k => {
    const q = DATA.quiz.find(x=>x.q===k);
    return q && S.qAnswers[k]===q.a;
  }).length;
  $('dashCards').innerHTML = [
    {icon:'📝',label:'名词',count:`${ll}/${lt}`,pct:lt?Math.round(ll/lt*100):0},
    {icon:'✏️',label:'刷题',count:`${lq}`,pct:lq?Math.round(lc/lq*100):0},
    {icon:'📖',label:'笔记',count:'9章'}
  ].map(c => `<div class="dash-card" onclick="switchPage('${c.label==='名词'?'terms':c.label==='刷题'?'quiz':'notes'}')">
    <div class="icon">${c.icon}</div><div class="count">${c.count}</div>
    <div class="label">${c.label}</div>
    ${c.pct!==undefined?`<div class="dash-progress"><div class="fill" style="width:${c.pct}%"></div></div>`:''}
  </div>`).join('');
  const total = lt + DATA.quiz.length;
  const done = ll + lq;
  $('dashProgress').textContent = `学习进度: ${done}/${total} (${total?Math.round(done/total*100):0}%)`;
}

// ===== TERMS =====
function renderLetterTabs() {
  const letters = [...new Set(DATA.terms.map(t=>t.l))].sort();
  $('letterTabs').innerHTML = '<span class="active" onclick="filterLetter(this,\'\')">全部</span>' +
    letters.map(l => `<span onclick="filterLetter(this,'${l}')">${l}</span>`).join('');
}
function filterLetter(el, l) {
  qsa('#letterTabs span').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  renderTermList(l ? DATA.terms.filter(t=>t.l===l) : DATA.terms);
}
function renderTermList(items) {
  $('termList').innerHTML = items.map(t => {
    const learned = S.learned.includes(t.n);
    return `<div class="term-item" onclick="toggleTerm(event,this)">
      <span class="term-check" onclick="event.stopPropagation();toggleLearned('${t.n}')">${learned?'✅':'⬜'}</span>
      <div><div class="term-name">${t.n}</div><div class="term-def">${t.d}</div></div>
    </div>`;
  }).join('');
}
function renderTerms() { filterLetter(qs('#letterTabs span'), ''); }
function toggleTerm(e, el) { if(e.target.classList.contains('term-check'))return; el.classList.toggle('open'); }
function toggleLearned(n) {
  const i = S.learned.indexOf(n);
  i>-1 ? S.learned.splice(i,1) : S.learned.push(n);
  localStorage.setItem('ml', JSON.stringify(S.learned));
  renderTerms(); renderHome();
}
function filterTerms() {
  const q = $('termSearch').value.trim();
  renderTermList(q ? DATA.terms.filter(t=>t.n.includes(q)||t.d.includes(q)) : DATA.terms);
}

// ===== Q&A =====
function renderQA() {
  const topics = [...new Set(DATA.qa.map(q=>q.t))];
  $('qaTopics').innerHTML = '<span class="tag tag-blue" style="cursor:pointer" onclick="filterQATopic(this,\'\')">全部</span>' +
    topics.map(t => `<span class="tag tag-green" style="cursor:pointer" onclick="filterQATopic(this,'${t}')">${t}</span>`).join('');
  renderQAList(DATA.qa);
}
function filterQATopic(el, t) {
  renderQAList(t ? DATA.qa.filter(q=>q.t===t) : DATA.qa);
}
function renderQAList(items) {
  $('qaList').innerHTML = items.map((q,i) => `<div class="card qa-item">
    <div class="qa-q" onclick="this.parentElement.classList.toggle('open')">${i+1}. ${q.q}</div>
    <div class="qa-a">${q.a}</div>
  </div>`).join('');
}
function filterQA() {
  const q = $('qaSearch').value.trim();
  renderQAList(q ? DATA.qa.filter(s=>s.q.includes(q)||s.a.includes(q)||s.t.includes(q)) : DATA.qa);
}
function randomQA() {
  const q = DATA.qa[Math.floor(Math.random()*DATA.qa.length)];
  switchPage('qa');
  renderQAList([q]);
}

// ===== QUIZ =====
var quizQuestions = [];
var quizIndex = 0;
var quizAnswered = 0;
var quizCorrect = 0;

var chapters = ['绪论','原核微生物','真核微生物','病毒','营养','代谢','生长','遗传','生态'];
var chStars = JSON.parse(localStorage.getItem('chStars')||'[0,0,0,0,0,0,0,0,0]');

function setQuizMode(mode) {
  var pb = document.getElementById('modePractice');
  var cb = document.getElementById('modeChallenge');
  if (mode === 'practice') {
    pb.style.background='var(--primary)';pb.style.color='#fff';pb.style.fontWeight='600';
    cb.style.background='var(--card)';cb.style.color='var(--text2)';cb.style.fontWeight='400';
    showPracticeMode();
  } else {
    cb.style.background='var(--primary)';cb.style.color='#fff';cb.style.fontWeight='600';
    pb.style.background='var(--card)';pb.style.color='var(--text2)';pb.style.fontWeight='400';
    showChallengeMode();
  }
}

function showPracticeMode() {
  var chs = ['全部','绪论','原核微生物','真核微生物','病毒','营养','代谢','生长','遗传','生态'];
  var opts = chs.map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join('');
  var h = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
  h += '<select id="quizChapter" style="padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);color:var(--text);outline:none;flex:1">'+opts+'</select>';
  h += '<button onclick="startPractice()" style="padding:8px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:13px">开始</button>';
  h += '</div><div id="quizStatus"></div><div id="quizCard" style="display:none"></div>';
  h += '<div style="display:flex;gap:6px;margin-top:8px" id="quizNav"></div><div id="quizResult"></div>';
  document.getElementById('quizPanel').innerHTML = h;
}

function startPractice() {
  var ch = document.getElementById('quizChapter').value;
  var pool = ch === '全部' ? DATA.quiz.slice() : DATA.quiz.filter(function(q){return q.c===ch});
  quizQuestions = pool.slice().sort(function(){return Math.random()-0.5});
  quizIndex = 0; quizAnswered = 0; quizCorrect = 0;
  document.getElementById('quizCard').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  if (quizIndex >= quizQuestions.length) { showPracticeResult(); return; }
  var q = quizQuestions[quizIndex];
  var ua = S.qAnswers[q.q], ans = ua !== undefined;
  var pct = quizQuestions.length ? Math.round(quizIndex/quizQuestions.length*100) : 0;
  var prog = '<div class="quiz-progress-bar"><div class="fill" style="width:'+pct+'%"></div></div>';
  var info = '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:6px">';
  info += '<span>'+(quizIndex+1)+'/'+quizQuestions.length+'</span><span>答'+quizAnswered+' 对'+quizCorrect+'</span></div>';
  var opts = '';
  for (var j=0;j<q.o.length;j++) {
    var cls = 'quiz-opt';
    if (ans) {
      if (j===q.a) cls+=' show-correct';
      if (j===ua&&j!==q.a) cls+=' selected-wrong';
      if (j===ua&&j===q.a) cls+=' selected-correct';
      cls+=' disabled';
    }
    opts += '<div class="'+cls+'" '+(ans?'':'onclick="checkAnswer('+j+','+q.a+','+quizIndex+')"')+'>'+'ABCD'[j]+'. '+q.o[j]+'</div>';
  }
  var card = '<div class="card"><span class="tag tag-blue">'+q.c+'</span>';
  card += '<div style="font-weight:600;font-size:14px;margin:8px 0">'+q.q+'</div>'+opts+'</div>';
  document.getElementById('quizStatus').innerHTML = prog + info;
  document.getElementById('quizCard').innerHTML = card;
  var nav = '<button onclick="prevQ()" style="padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:13px">上一题</button>';
  nav += '<button onclick="nextQ()" style="padding:8px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:13px">下一题</button>';
  document.getElementById('quizNav').innerHTML = nav;
}

function checkAnswer(selIdx, correctIdx, qi) {
  var q = quizQuestions[qi];
  S.qAnswers[q.q] = selIdx;
  localStorage.setItem('mq', JSON.stringify(S.qAnswers));
  quizAnswered++;
  if (selIdx === correctIdx) quizCorrect++;
  showQuestion();
}

function nextQ() { if (quizIndex < quizQuestions.length-1) { quizIndex++; showQuestion(); } }
function prevQ() { if (quizIndex > 0) { quizIndex--; showQuestion(); } }

function showPracticeResult() {
  var pct = quizQuestions.length ? Math.round(quizCorrect/quizQuestions.length*100) : 0;
  var emoji = pct>=80?'🎉':(pct>=60?'👍':'💪');
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('quizNav').innerHTML = '';
  document.getElementById('quizResult').innerHTML = '<div class="card" style="text-align:center;padding:30px">'+
    '<div style="font-size:40px;margin-bottom:10px">'+emoji+'</div>'+
    '<div style="font-size:20px;font-weight:700">'+quizCorrect+'/'+quizQuestions.length+'</div>'+
    '<div style="font-size:15px;color:var(--text2);margin:6px 0">正确率 '+pct+'%</div>'+
    '<button onclick="startPractice()" style="margin-top:12px;padding:10px 24px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:14px">再来一轮</button></div>';

// ===== CHALLENGE =====
function showChallengeMode() {
  var h = '<div style="margin-bottom:10px"><div style="font-weight:600;font-size:15px">闯关模式</div>';
  h += '<div style="font-size:13px;color:var(--text2);margin-top:2px">逐章通关，每关5题，全部答对得三星</div></div>';
  h += '<div id="challengeMap"></div><div id="challengePlay" style="display:none"></div>';
  document.getElementById('quizPanel').innerHTML = h;
  renderMap();
}

function renderMap() {
  var h = '';
  for (var i=0;i<chapters.length;i++) {
    var stars = chStars[i]||0;
    var s = '';
    for (var j=0;j<3;j++) s += j<stars?'⭐':'☆';
    var b = stars>0?'style="border-left:3px solid var(--success)"':'';
    h += '<div class="card" '+b+' onclick="startLevel('+i+')" style="cursor:pointer">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center">';
    h += '<div><div style="font-weight:600">第'+(i+1)+'关: '+chapters[i]+'</div>';
    h += '<div style="font-size:12px;color:var(--text2);margin-top:2px">'+s+'</div></div>';
    h += '<div style="font-size:20px">'+(stars>0?'✅':'')+'</div></div></div>';
  }
  document.getElementById('challengeMap').innerHTML = h;
}

function startLevel(idx) {
  challengeLevel = idx;
  var ch = chapters[idx];
  var pool = DATA.quiz.filter(function(q){return q.c===ch});
  if (pool.length < 3) { showChallengeMode(); return; }
  quizQuestions = pool.slice().sort(function(){return Math.random()-0.5}).slice(0,5);
  quizIndex = 0; quizCorrect = 0;
  document.getElementById('challengeMap').style.display = 'none';
  document.getElementById('challengePlay').style.display = 'block';
  showLevel();
}

function showLevel() {
  if (quizIndex >= quizQuestions.length) { showLevelResult(); return; }
  var q = quizQuestions[quizIndex];
  var dots = '';
  for (var i=0;i<quizQuestions.length;i++) dots += i<quizIndex?'🟢':(i===quizIndex?'⚪':'⚫');
  var h = '<div style="font-size:12px;color:var(--text2);margin-bottom:4px">第'+(challengeLevel+1)+'关 '+chapters[challengeLevel]+' '+(quizIndex+1)+'/'+quizQuestions.length+'</div>';
  h += '<div style="font-size:11px;margin-bottom:8px">'+dots+'</div>';
  var opts = '';
  for (var j=0;j<q.o.length;j++) {
    opts += '<div class="quiz-opt" onclick="checkLevel(this,'+j+','+q.a+')">'+'ABCD'[j]+'. '+q.o[j]+'</div>';
  }
  h += '<div class="card"><div style="font-weight:600;font-size:14px;margin-bottom:8px">'+q.q+'</div>'+opts+'</div>';
  document.getElementById('challengePlay').innerHTML = h;
}

function checkLevel(el, selIdx, correctIdx) {
  var card = el.closest('.card');
  var opts = card.querySelectorAll('.quiz-opt');
  for (var i=0;i<opts.length;i++) opts[i].classList.add('disabled');
  el.classList.add(selIdx===correctIdx?'selected-correct':'selected-wrong');
  opts[correctIdx].classList.add('show-correct');
  if (selIdx === correctIdx) quizCorrect++;
  setTimeout(function(){quizIndex++;showLevel();}, 600);
}

function showLevelResult() {
  var total = quizQuestions.length;
  var stars = quizCorrect===total?3:(quizCorrect>=total-1?2:(quizCorrect>=total-2?1:0));
  if (stars > (chStars[challengeLevel]||0)) {
    chStars[challengeLevel] = stars;
    localStorage.setItem('chStars', JSON.stringify(chStars));
  }
  var ss = '';
  for (var i=0;i<3;i++) ss += i<stars?'⭐':'☆';
  var msg = stars===3?'完美通关!':(stars>=2?'不错!':'继续加油!');
  var h = '<div class="card" style="text-align:center;padding:30px">';
  h += '<div style="font-size:40px;margin-bottom:6px">'+ss+'</div>';
  h += '<div style="font-size:20px;font-weight:700;margin:8px 0">'+quizCorrect+'/'+total+'</div>';
  h += '<div style="font-size:15px;color:var(--text2)">'+msg+'</div>';
  h += '<div style="display:flex;gap:8px;justify-content:center;margin-top:14px">';
  h += '<button onclick="startLevel('+challengeLevel+')" style="padding:8px 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-size:13px">重试</button>';
  h += '<button onclick="showChallengeMode()" style="padding:8px 20px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:13px">返回</button></div></div>';
  document.getElementById('challengePlay').innerHTML = h;
}

  DATA.latin.forEach(l=>{if(l.n.includes(q)||l.l.toLowerCase().includes(q))r.push({title:l.n,snippet:l.l,src:'拉丁名',page:'latin'})});
  if(r.length>30)r=r.slice(0,30);
  if(!r.length){el.innerHTML='<div class="empty"><div class="icon">😕</div>未找到</div>';return}
  el.innerHTML = r.map(rr => `<div class="card" style="cursor:pointer" onclick="switchPage('${rr.page}')">
    <span class="tag tag-blue">${rr.src}</span>
    <div style="font-weight:600;margin-top:4px">${rr.title.replace(new RegExp(q,'gi'),m=>'<mark>'+m+'</mark>')}</div>
    <div style="font-size:13px;color:var(--text2);margin-top:2px">${rr.snippet.slice(0,100).replace(new RegExp(q,'gi'),m=>'<mark>'+m+'</mark>')}</div>
  </div>`).join('');
}
</script>
</body>
</html>
